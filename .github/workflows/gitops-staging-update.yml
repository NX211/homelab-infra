name: GitOps Staging Update
on:
  repository_dispatch:
    types: [staging-image-push]

concurrency:
  group: gitops-staging-${{ github.event.client_payload.app_name }}
  cancel-in-progress: false

jobs:
  update:
    name: Update Staging Helm Values
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Validate payload
        id: validate
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          DIGEST: ${{ github.event.client_payload.digest }}
          IMAGE: ${{ github.event.client_payload.image }}
        run: |
          if [ -z "$APP_NAME" ] || [ -z "$DIGEST" ] || [ -z "$IMAGE" ]; then
            echo "ERROR: Missing required fields in client_payload"
            echo "  app_name=$APP_NAME"
            echo "  digest=$DIGEST"
            echo "  image=$IMAGE"
            exit 1
          fi

          # Reject app_name and image values containing path traversal
          # or shell metacharacters. Everything that flows through this
          # workflow originates from a trusted Cloud Run dispatch, but
          # defense in depth is cheap.
          if ! printf '%s' "$APP_NAME" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "ERROR: Invalid app_name: $APP_NAME"
            exit 1
          fi

          VALUES_FILE="staging-apps/${APP_NAME}/values.yaml"
          if [ ! -f "$VALUES_FILE" ]; then
            echo "ERROR: Staging chart not found at ${VALUES_FILE}"
            echo "Known staging apps:"
            ls staging-apps/
            exit 1
          fi

          # Extract the short image name (last path segment, e.g.
          # "dispatchr-web" or "dispatchr-worker") from the full AR
          # reference. Used as a per-image PR branch suffix so concurrent
          # web/worker pushes don't overwrite each other's changes on a
          # shared branch — the previous fixed `staging/<app>` branch
          # was silently force-pushed by each subsequent dispatch.
          #
          # gitops-trigger dispatches the IMAGE field with whichever ref
          # form the AR pubsub event carried: a bare repo path, a
          # `:tag` suffix, or (most common) an `@sha256:...` digest
          # suffix. Strip the suffix before validating so the regex
          # only sees the repo-short name. The order is @ first then
          # :tag to handle both cleanly.
          IMAGE_SHORT="${IMAGE##*/}"
          IMAGE_SHORT="${IMAGE_SHORT%@*}"
          IMAGE_SHORT="${IMAGE_SHORT%%:*}"
          if ! printf '%s' "$IMAGE_SHORT" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "ERROR: Failed to extract valid short image name from IMAGE=$IMAGE"
            exit 1
          fi

          echo "image_short=${IMAGE_SHORT}" >> "$GITHUB_OUTPUT"
          echo "Updating staging ${APP_NAME} (${IMAGE_SHORT}) to digest ${DIGEST}"

      - name: Install yq
        uses: mikefarah/yq@v4

      # Re-fetch latest main right before making changes. Other queued
      # runs in the same concurrency group may have merged PRs between
      # the initial checkout and now, so the working tree could be stale.
      - name: Refresh to latest main
        run: |
          git fetch origin main
          git reset --hard origin/main

      - name: Update image digest
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          DIGEST: ${{ github.event.client_payload.digest }}
          TAG: ${{ github.event.client_payload.tag }}
          MIGRATE_DIGEST: ${{ github.event.client_payload.migrate_digest }}
        run: |
          VALUES_FILE="staging-apps/${APP_NAME}/values.yaml"

          # Values are nested under the staging-app subchart key
          yq eval ".\"staging-app\".image.digest = \"${DIGEST}\"" -i "${VALUES_FILE}"

          # Update migration digest if provided and migration is enabled
          if [ -n "$MIGRATE_DIGEST" ]; then
            MIGRATION_ENABLED=$(yq eval '.["staging-app"].migration.enabled // false' "${VALUES_FILE}")
            if [ "$MIGRATION_ENABLED" = "true" ]; then
              yq eval ".\"staging-app\".migration.digest = \"${MIGRATE_DIGEST}\"" -i "${VALUES_FILE}"
              echo "Updated migration digest to ${MIGRATE_DIGEST}"
            fi
          fi

          if [[ "${TAG}" == v* ]]; then
            CHART_FILE="staging-apps/${APP_NAME}/Chart.yaml"
            if [ -f "$CHART_FILE" ]; then
              yq eval ".appVersion = \"${TAG}\"" -i "${CHART_FILE}"
              echo "Updated appVersion in ${CHART_FILE} to ${TAG}"
            fi
          fi

          echo "Updated ${VALUES_FILE}:"
          yq eval '.["staging-app"].image' "${VALUES_FILE}"
          yq eval '.migration' "${VALUES_FILE}"

      - name: Helm lint
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
        run: |
          helm lint "staging-apps/${APP_NAME}"

      - name: Create PR
        id: create-pr
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ steps.app-token.outputs.token }}
          # Per-image branch (staging/<app>/<image-short>) so concurrent
          # dispatches for different images in the same app don't race
          # on a shared branch and force-push each other's changes away.
          branch: staging/${{ github.event.client_payload.app_name }}/${{ steps.validate.outputs.image_short }}
          title: "staging: update ${{ github.event.client_payload.app_name }} (${{ steps.validate.outputs.image_short }}) image"
          body: |
            Automated staging image update

            - **App:** `${{ github.event.client_payload.app_name }}`
            - **Image:** `${{ steps.validate.outputs.image_short }}`
            - **Digest:** `${{ github.event.client_payload.digest }}`
            - **Tag:** `${{ github.event.client_payload.tag || 'N/A' }}`

            Once merged and ArgoCD confirms healthy, this will auto-promote
            to production via `staging-promote.yml`.
          labels: staging,auto-merge
          delete-branch: true

      - name: Merge PR
        if: steps.create-pr.outputs.pull-request-number
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_NUMBER: ${{ steps.create-pr.outputs.pull-request-number }}
        run: |
          # Merge directly instead of using --auto. Auto-merge enables
          # the merge but doesn't wait — the job finishes, the
          # concurrency lock releases, and other queued runs can merge
          # PRs that make this one conflict before auto-merge fires.
          # Direct merge holds the concurrency lock until the PR is
          # actually merged, preventing the race condition.
          #
          # If required checks exist, wait for them first (up to 10 min).
          if ! gh pr merge "$PR_NUMBER" --squash 2>&1; then
            echo "Direct merge failed — waiting for status checks"
            gh pr checks "$PR_NUMBER" --watch --fail-fast || true
            gh pr merge "$PR_NUMBER" --squash
          fi
