name: Staging Promote to Production
on:
  pull_request:
    types: [closed]
    branches: [main]

# Promotion no longer waits for staging to roll out — it dispatches the prod
# gitops update immediately. The prod PR is created right away (visibility,
# review window), and gating is handled by the `staging/ok` check_run that
# platform-infra opens on that PR and homelab-infra's staging-track.yml
# finalizes once ArgoCD + smoke complete. See staging-track.yml.

jobs:
  promote:
    name: Dispatch prod gitops update
    if: >
      github.event.pull_request.merged == true &&
      contains(github.event.pull_request.labels.*.name, 'staging')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install yq
        uses: mikefarah/yq@v4

      - name: Extract app info from PR
        id: app-info
        env:
          PR_BRANCH: ${{ github.event.pull_request.head.ref }}
        run: |
          # PR branch format is `staging/<app-name>/<image-short>`, e.g.
          # `staging/dispatchr-social/dispatchr-web`. Split on the first
          # `/` after the `staging/` prefix so app-names containing dashes
          # (dispatchr-social, jlshaw-link) parse unambiguously.
          BRANCH_PATH="${PR_BRANCH#staging/}"
          APP_NAME="${BRANCH_PATH%%/*}"
          IMAGE_SHORT="${BRANCH_PATH#*/}"

          # Validate both components are safe before using in file paths
          # or shell expansions. PR_BRANCH is attacker-controllable in
          # theory (anyone who can open a PR) so we do not trust it —
          # only exact-match whitelists pass.
          if ! printf '%s' "$APP_NAME" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "ERROR: Invalid app name extracted from branch: $APP_NAME"
            exit 1
          fi
          if [ -z "$IMAGE_SHORT" ] || [ "$IMAGE_SHORT" = "$BRANCH_PATH" ]; then
            echo "ERROR: Branch is missing the image-short segment (expected staging/<app>/<image>)"
            exit 1
          fi
          if ! printf '%s' "$IMAGE_SHORT" | grep -qE '^[a-zA-Z0-9_-]+$'; then
            echo "ERROR: Invalid image-short extracted from branch: $IMAGE_SHORT"
            exit 1
          fi

          VALUES_FILE="staging-apps/${APP_NAME}/values.yaml"
          CHART_FILE="staging-apps/${APP_NAME}/Chart.yaml"

          if [ ! -f "$VALUES_FILE" ]; then
            echo "ERROR: Values file not found: ${VALUES_FILE}"
            exit 1
          fi

          # The staging chart currently only exposes the web image under
          # .staging-app.image.*. When worker staging support is added,
          # this step will need to select the correct values path based
          # on IMAGE_SHORT (e.g. worker → .worker.image.*).
          DIGEST=$(yq eval '.["staging-app"].image.digest' "${VALUES_FILE}")
          IMAGE=$(yq eval '.["staging-app"].image.repository' "${VALUES_FILE}")
          TAG=$(yq eval '.appVersion' "${CHART_FILE}" 2>/dev/null || echo "")
          MIGRATE_DIGEST=$(yq eval '.["staging-app"].migration.digest // ""' "${VALUES_FILE}")

          echo "app_name=${APP_NAME}" >> "$GITHUB_OUTPUT"
          echo "image_short=${IMAGE_SHORT}" >> "$GITHUB_OUTPUT"
          echo "digest=${DIGEST}" >> "$GITHUB_OUTPUT"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "migrate_digest=${MIGRATE_DIGEST}" >> "$GITHUB_OUTPUT"

          echo "App: ${APP_NAME}, Image: ${IMAGE_SHORT}, Digest: ${DIGEST}, Tag: ${TAG}, Migrate: ${MIGRATE_DIGEST}"

      - name: Generate GitHub App token for production dispatch
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: Corey-Alan-Consulting

      - name: Mint dispatch correlation ID
        id: dispatch-id
        run: |
          # Correlation ID threaded through the entire chain (image-push →
          # gitops-update → staging-track → check_run output). Lets log
          # searches join cleanly across repos.
          DISPATCH_ID="dispatch-$(date -u +%Y%m%dT%H%M%SZ)-$(openssl rand -hex 4)"
          echo "id=${DISPATCH_ID}" >> "$GITHUB_OUTPUT"
          echo "Dispatch ID: ${DISPATCH_ID}"

      - name: Dispatch image-push to production
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_NAME: ${{ steps.app-info.outputs.app_name }}
          IMAGE_SHORT: ${{ steps.app-info.outputs.image_short }}
          IMAGE: ${{ steps.app-info.outputs.image }}
          DIGEST: ${{ steps.app-info.outputs.digest }}
          TAG: ${{ steps.app-info.outputs.tag }}
          MIGRATE_DIGEST: ${{ steps.app-info.outputs.migrate_digest }}
          DISPATCH_ID: ${{ steps.dispatch-id.outputs.id }}
        run: |
          PAYLOAD=$(jq -n \
            --arg app_name "$APP_NAME" \
            --arg image_short "$IMAGE_SHORT" \
            --arg image "$IMAGE" \
            --arg digest "$DIGEST" \
            --arg tag "$TAG" \
            --arg migrate_digest "$MIGRATE_DIGEST" \
            --arg argo_app "staging-${APP_NAME}" \
            --arg dispatch_id "$DISPATCH_ID" \
            '{
              event_type: "image-push",
              client_payload: {
                app_name: $app_name,
                image_short: $image_short,
                image: $image,
                digest: $digest,
                tag: $tag,
                migrate_digest: $migrate_digest,
                argo_app: $argo_app,
                dispatch_id: $dispatch_id
              }
            }')

          HTTP_STATUS=$(curl -sS -o /tmp/dispatch.json -w "%{http_code}" -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/Corey-Alan-Consulting/platform-infra/dispatches" \
            -d "$PAYLOAD")

          if [ "$HTTP_STATUS" = "204" ]; then
            echo "Production dispatch sent (${DISPATCH_ID})"
          else
            echo "ERROR: Production dispatch failed with status ${HTTP_STATUS}"
            cat /tmp/dispatch.json || true
            exit 1
          fi
