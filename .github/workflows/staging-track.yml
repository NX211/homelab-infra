name: Staging Track (PR Callback)
on:
  repository_dispatch:
    types: [staging-track]

# Cancel any in-flight tracker for the same check_run when a fresh dispatch
# arrives. The check_run is the correlation key — re-running gitops-update
# would open a new check_run, not collide here.
concurrency:
  group: staging-track-${{ github.event.client_payload.check_run_id }}
  cancel-in-progress: true

jobs:
  track:
    name: Track staging health and smoke
    runs-on: ubuntu-latest
    # ArgoCD wait ≤ 10 min + smoke ≤ 5 min + slack. If the job exceeds this,
    # the finalize step (if: always()) still runs and patches the check_run
    # to failure so the PR never sits in_progress forever.
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      # ─────────────────────────────────────────────────────────────────
      # Validate every client_payload field BEFORE using any of it in
      # gh api paths or shell expansions. repository_dispatch payloads
      # are trusted in our setup (App token required to dispatch), but
      # defense in depth — and a malformed dispatch should fail loud,
      # not silently corrupt a URL.
      # ─────────────────────────────────────────────────────────────────
      - name: Validate dispatch payload
        id: validate
        env:
          APP_NAME: ${{ github.event.client_payload.app_name }}
          IMAGE_SHORT: ${{ github.event.client_payload.image_short }}
          PR_NUMBER: ${{ github.event.client_payload.pr_number }}
          HEAD_SHA: ${{ github.event.client_payload.head_sha }}
          CHECK_RUN_ID: ${{ github.event.client_payload.check_run_id }}
          ARGO_APP: ${{ github.event.client_payload.argo_app }}
          DISPATCH_ID: ${{ github.event.client_payload.dispatch_id }}
        run: |
          fail() { echo "ERROR: $1"; exit 1; }

          [ -n "$APP_NAME" ]     || fail "missing app_name"
          [ -n "$IMAGE_SHORT" ]  || fail "missing image_short"
          [ -n "$PR_NUMBER" ]    || fail "missing pr_number"
          [ -n "$HEAD_SHA" ]     || fail "missing head_sha"
          [ -n "$CHECK_RUN_ID" ] || fail "missing check_run_id"
          [ -n "$ARGO_APP" ]     || fail "missing argo_app"

          printf '%s' "$APP_NAME"     | grep -qE '^[a-zA-Z0-9_-]+$'  || fail "bad app_name: $APP_NAME"
          printf '%s' "$IMAGE_SHORT"  | grep -qE '^[a-zA-Z0-9_-]+$'  || fail "bad image_short: $IMAGE_SHORT"
          printf '%s' "$PR_NUMBER"    | grep -qE '^[0-9]+$'          || fail "bad pr_number: $PR_NUMBER"
          printf '%s' "$HEAD_SHA"     | grep -qE '^[a-f0-9]{40}$'    || fail "bad head_sha: $HEAD_SHA"
          printf '%s' "$CHECK_RUN_ID" | grep -qE '^[0-9]+$'          || fail "bad check_run_id: $CHECK_RUN_ID"
          printf '%s' "$ARGO_APP"     | grep -qE '^[a-zA-Z0-9_-]+$'  || fail "bad argo_app: $ARGO_APP"

          # DISPATCH_ID is optional and only used in display text, but a
          # malformed value still gets sanitized to empty rather than
          # leaking into output where it could be misread.
          if [ -n "$DISPATCH_ID" ] && ! printf '%s' "$DISPATCH_ID" | grep -qE '^[A-Za-z0-9._-]+$'; then
            DISPATCH_ID=""
          fi

          {
            echo "app_name=${APP_NAME}"
            echo "image_short=${IMAGE_SHORT}"
            echo "pr_number=${PR_NUMBER}"
            echo "head_sha=${HEAD_SHA}"
            echo "check_run_id=${CHECK_RUN_ID}"
            echo "argo_app=${ARGO_APP}"
            echo "dispatch_id=${DISPATCH_ID}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GITOPS_APP_ID }}
          private-key: ${{ secrets.GITOPS_APP_PRIVATE_KEY }}
          owner: Corey-Alan-Consulting

      # ─────────────────────────────────────────────────────────────────
      # Stage 1 / 2: wait for ArgoCD Healthy + Synced
      # ─────────────────────────────────────────────────────────────────
      - name: Update check_run — waiting for ArgoCD
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHECK_RUN_ID: ${{ steps.validate.outputs.check_run_id }}
          ARGO_APP: ${{ steps.validate.outputs.argo_app }}
          APP_NAME: ${{ steps.validate.outputs.app_name }}
          DISPATCH_ID: ${{ steps.validate.outputs.dispatch_id }}
        run: |
          SUMMARY="Polling ArgoCD application **${ARGO_APP}** for \`Healthy\` + \`Synced\`. This typically takes 1–5 minutes."
          if [ -n "$DISPATCH_ID" ]; then
            SUMMARY="${SUMMARY}"$'\n\n'"Dispatch: \`${DISPATCH_ID}\`"
          fi
          gh api -X PATCH "repos/Corey-Alan-Consulting/platform-infra/check-runs/${CHECK_RUN_ID}" \
            -f status="in_progress" \
            -f "output[title]=Waiting for ArgoCD: ${ARGO_APP}" \
            -f "output[summary]=$SUMMARY"

      - name: Wait for ArgoCD sync and health
        id: health
        env:
          ARGOCD_TOKEN: ${{ secrets.ARGOCD_API_TOKEN }}
          ARGOCD_SERVER: ${{ secrets.ARGOCD_SERVER_URL }}
          ARGO_APP: ${{ steps.validate.outputs.argo_app }}
        run: |
          MAX_ATTEMPTS=30
          ATTEMPT=0
          HEALTH=""
          SYNC=""

          echo "Waiting for ArgoCD app ${ARGO_APP} to be Healthy and Synced..."

          # Pre-flight: 404 fast instead of burning the polling budget on
          # a mistyped app name.
          PREFLIGHT_STATUS=$(curl -sS -o /tmp/argo-preflight.json -w '%{http_code}' \
            -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
            "${ARGOCD_SERVER}/api/v1/applications/${ARGO_APP}" || echo "000")
          if [ "$PREFLIGHT_STATUS" = "404" ]; then
            echo "ERROR: ArgoCD Application '${ARGO_APP}' not found (404)."
            echo "Expected naming convention: staging-<app-name> matching staging-apps/<app-name>/."
            exit 1
          fi
          if [ "$PREFLIGHT_STATUS" != "200" ]; then
            echo "ERROR: ArgoCD preflight failed with HTTP ${PREFLIGHT_STATUS}"
            cat /tmp/argo-preflight.json || true
            exit 1
          fi

          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))

            RESPONSE=$(curl -sS -H "Authorization: Bearer ${ARGOCD_TOKEN}" \
              "${ARGOCD_SERVER}/api/v1/applications/${ARGO_APP}" || echo "{}")

            HEALTH=$(echo "$RESPONSE" | jq -r '.status.health.status // "Unknown"')
            SYNC=$(echo "$RESPONSE"   | jq -r '.status.sync.status   // "Unknown"')

            echo "Attempt ${ATTEMPT}/${MAX_ATTEMPTS}: health=${HEALTH} sync=${SYNC}"

            if [ "$HEALTH" = "Healthy" ] && [ "$SYNC" = "Synced" ]; then
              echo "Staging app is Healthy and Synced!"
              break
            fi

            if [ "$HEALTH" = "Degraded" ]; then
              echo "ERROR: Staging app is Degraded. Aborting tracker."
              exit 1
            fi

            sleep 20
          done

          if [ "$HEALTH" != "Healthy" ] || [ "$SYNC" != "Synced" ]; then
            echo "ERROR: Timed out waiting for staging app (last: health=${HEALTH}, sync=${SYNC})"
            exit 1
          fi

      # ─────────────────────────────────────────────────────────────────
      # Stage 2 / 2: smoke tests
      # ─────────────────────────────────────────────────────────────────
      - name: Update check_run — running smoke tests
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHECK_RUN_ID: ${{ steps.validate.outputs.check_run_id }}
          APP_NAME: ${{ steps.validate.outputs.app_name }}
          DISPATCH_ID: ${{ steps.validate.outputs.dispatch_id }}
        run: |
          SUMMARY="Staging is **Healthy** + **Synced**. Dispatching smoke tests for \`${APP_NAME}\`…"
          if [ -n "$DISPATCH_ID" ]; then
            SUMMARY="${SUMMARY}"$'\n\n'"Dispatch: \`${DISPATCH_ID}\`"
          fi
          gh api -X PATCH "repos/Corey-Alan-Consulting/platform-infra/check-runs/${CHECK_RUN_ID}" \
            -f status="in_progress" \
            -f "output[title]=Running smoke tests for ${APP_NAME}" \
            -f "output[summary]=$SUMMARY"

      - name: Run staging smoke tests
        id: smoke
        if: success()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          APP_NAME: ${{ steps.validate.outputs.app_name }}
        run: |
          # Smoke test repos are keyed by app_name. Apps without an entry
          # are treated as "no smoke tests" — emit `skipped=true` so the
          # finalizer doesn't fail the check on a missing entry.
          declare -A SMOKE_REPOS=(
            ["coreyalan-com"]="Corey-Alan-Consulting/coreyalan.com"
          )

          REPO="${SMOKE_REPOS[$APP_NAME]:-}"
          if [ -z "$REPO" ]; then
            echo "No smoke test configured for ${APP_NAME}, skipping"
            echo "skipped=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skipped=false" >> "$GITHUB_OUTPUT"
          echo "smoke_repo=${REPO}" >> "$GITHUB_OUTPUT"

          echo "Dispatching smoke tests to ${REPO}..."
          gh api "repos/${REPO}/dispatches" \
            -f event_type=staging-smoke-test \
            -f "client_payload[staging_url]=https://staging.coreyalan.com"

          sleep 15

          MAX_ATTEMPTS=30
          for i in $(seq 1 $MAX_ATTEMPTS); do
            RUN_JSON=$(gh run list --repo "$REPO" --event repository_dispatch \
              --workflow "staging-smoke.yml" --limit 1 \
              --json status,conclusion,url 2>/dev/null || echo "[]")

            STATUS=$(echo "$RUN_JSON"     | jq -r '.[0].status // "unknown"')
            CONCLUSION=$(echo "$RUN_JSON" | jq -r '.[0].conclusion // ""')
            RUN_URL=$(echo "$RUN_JSON"    | jq -r '.[0].url // ""')

            if [ "$STATUS" = "completed" ]; then
              echo "smoke_run_url=${RUN_URL}" >> "$GITHUB_OUTPUT"
              if [ "$CONCLUSION" = "success" ]; then
                echo "Smoke tests passed!"
                exit 0
              fi
              echo "ERROR: Smoke tests failed (conclusion: ${CONCLUSION})"
              exit 1
            fi

            echo "Attempt ${i}/${MAX_ATTEMPTS}: smoke tests ${STATUS}..."
            sleep 10
          done

          echo "ERROR: Smoke tests timed out after ${MAX_ATTEMPTS} attempts"
          exit 1

      # ─────────────────────────────────────────────────────────────────
      # Finalizer — always runs. Patches the check_run based on the
      # outcomes of the health + smoke steps. Required to guarantee the
      # check never sits in_progress forever (job timeout, runner crash,
      # cancellation by a fresh dispatch in the concurrency group).
      # ─────────────────────────────────────────────────────────────────
      - name: Finalize check_run
        if: always()
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CHECK_RUN_ID: ${{ steps.validate.outputs.check_run_id }}
          ARGO_APP: ${{ steps.validate.outputs.argo_app }}
          APP_NAME: ${{ steps.validate.outputs.app_name }}
          DISPATCH_ID: ${{ steps.validate.outputs.dispatch_id }}
          HEALTH_OUTCOME: ${{ steps.health.outcome }}
          SMOKE_OUTCOME: ${{ steps.smoke.outcome }}
          SMOKE_SKIPPED: ${{ steps.smoke.outputs.skipped }}
          SMOKE_RUN_URL: ${{ steps.smoke.outputs.smoke_run_url }}
        run: |
          # outcome values: success | failure | cancelled | skipped
          # SMOKE_OUTCOME=skipped when the `if: success()` guard skipped
          # the step (health failed); we distinguish that from SMOKE_SKIPPED=true
          # which is the in-step decision (no smoke test configured).

          if [ "$HEALTH_OUTCOME" = "success" ] && \
             { [ "$SMOKE_OUTCOME" = "success" ] || [ "$SMOKE_SKIPPED" = "true" ]; }; then
            CONCLUSION="success"
            TITLE="Staging is healthy"
            if [ "$SMOKE_SKIPPED" = "true" ]; then
              SUMMARY="ArgoCD app \`${ARGO_APP}\` is **Healthy** + **Synced**. No smoke tests configured for \`${APP_NAME}\`."
            else
              SUMMARY="ArgoCD app \`${ARGO_APP}\` is **Healthy** + **Synced**. Smoke tests passed."
              if [ -n "$SMOKE_RUN_URL" ]; then
                SUMMARY="${SUMMARY}"$'\n\n'"Smoke run: ${SMOKE_RUN_URL}"
              fi
            fi
          elif [ "$HEALTH_OUTCOME" != "success" ]; then
            CONCLUSION="failure"
            TITLE="Staging health check failed"
            SUMMARY="ArgoCD app \`${ARGO_APP}\` did not reach Healthy + Synced (outcome: \`${HEALTH_OUTCOME}\`). Smoke tests skipped. See the staging-track workflow run for the polling log."
          else
            CONCLUSION="failure"
            TITLE="Staging smoke tests failed"
            SUMMARY="ArgoCD app \`${ARGO_APP}\` is healthy but smoke tests for \`${APP_NAME}\` failed (outcome: \`${SMOKE_OUTCOME}\`)."
            if [ -n "$SMOKE_RUN_URL" ]; then
              SUMMARY="${SUMMARY}"$'\n\n'"Smoke run: ${SMOKE_RUN_URL}"
            fi
          fi

          if [ -n "$DISPATCH_ID" ]; then
            SUMMARY="${SUMMARY}"$'\n\n'"Dispatch: \`${DISPATCH_ID}\`"
          fi

          gh api -X PATCH "repos/Corey-Alan-Consulting/platform-infra/check-runs/${CHECK_RUN_ID}" \
            -f status="completed" \
            -f conclusion="$CONCLUSION" \
            -f "output[title]=$TITLE" \
            -f "output[summary]=$SUMMARY"

          echo "check_run ${CHECK_RUN_ID} finalized: ${CONCLUSION}"
