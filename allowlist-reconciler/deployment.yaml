---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allowlist-reconciler
  namespace: staging
  labels:
    app.kubernetes.io/name: allowlist-reconciler
    app.kubernetes.io/part-of: staging
spec:
  replicas: 1
  # Single writer — avoid two replicas racing to patch the same Middleware.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: allowlist-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: allowlist-reconciler
        app.kubernetes.io/part-of: staging
    spec:
      serviceAccountName: allowlist-reconciler
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconciler
          # TODO: build + push (see apps/allowlist-reconciler/README.md), then
          # pin a digest the way the staging apps do.
          image: us-central1-docker.pkg.dev/corey-alan-prod/coreyalan/allowlist-reconciler:0.1.0
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: COREYALAN_BASE_URL
              value: https://coreyalan.com
            - name: NAMESPACE
              value: staging
          envFrom:
            - secretRef:
                name: allowlist-reconciler-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
