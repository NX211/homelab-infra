---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: allowlist-reconciler
  namespace: staging
  labels:
    app.kubernetes.io/name: allowlist-reconciler
    app.kubernetes.io/part-of: staging
spec:
  replicas: 1
  # Single writer — avoid two replicas racing to patch the same Middleware.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: allowlist-reconciler
  template:
    metadata:
      labels:
        app.kubernetes.io/name: allowlist-reconciler
        app.kubernetes.io/part-of: staging
    spec:
      serviceAccountName: allowlist-reconciler
      # The image lives in the private corey-alan-prod Artifact Registry; reuse
      # the dockerconfigjson the coreyalan-com staging release syncs from
      # Bitwarden (GCR_SERVICE_ACCOUNT_KEY) into this namespace.
      imagePullSecrets:
        - name: gcr-pull-secret-coreyalan
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: reconciler
          # Built from apps/allowlist-reconciler and pinned by digest (the tag
          # is kept for readability). Rebuild + repush + re-pin to update.
          image: us-central1-docker.pkg.dev/corey-alan-prod/coreyalan/allowlist-reconciler:0.1.0@sha256:d4e46b7ae2eccacb30d129f8d8d46e3576425b2bec1d98f75780b4f7836d051b
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: COREYALAN_BASE_URL
              value: https://coreyalan.com
            - name: NAMESPACE
              value: staging
          envFrom:
            - secretRef:
                name: allowlist-reconciler-secrets
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ['ALL']
          resources:
            requests:
              cpu: 10m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
