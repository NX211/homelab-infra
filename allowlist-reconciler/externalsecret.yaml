---
# Secrets for the reconciler, pulled from Bitwarden via the ClusterSecretStore
# the coreyalan-com staging release already creates (these secrets live in
# coreyalan's Bitwarden project). ClusterSecretStore is cluster-scoped, so it is
# reachable from the staging namespace.
# These three items live in the "Staging - Corey Alan Consulting" Bitwarden
# project and must carry the same values as their prod counterparts on
# coreyalan.com:
#   - STAGING_INTERNAL_API_TOKEN     (also set on coreyalan.com)
#   - STAGING_ALLOWLIST_HMAC_SECRET  (also set on coreyalan.com — must match)
#   - RECONCILER_WEBHOOK_TOKEN       (also set on coreyalan.com as
#                                     STAGING_RECONCILER_WEBHOOK_TOKEN)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: allowlist-reconciler-secrets
  namespace: staging
  labels:
    app.kubernetes.io/name: allowlist-reconciler
    app.kubernetes.io/part-of: staging
  annotations:
    argocd.argoproj.io/sync-wave: '-4'
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-staging-coreyalan
    kind: ClusterSecretStore
  target:
    name: allowlist-reconciler-secrets
    creationPolicy: Owner
  data:
    - secretKey: STAGING_INTERNAL_API_TOKEN
      remoteRef:
        key: 2c37ebbd-877e-4d59-917f-b4740105eb5d
    - secretKey: STAGING_ALLOWLIST_HMAC_SECRET
      remoteRef:
        key: c9dbc8ce-1a6c-47f5-9743-b4740105eb9b
    - secretKey: RECONCILER_WEBHOOK_TOKEN
      remoteRef:
        key: ef6e7090-8690-46a4-a34f-b4740105ebd6
