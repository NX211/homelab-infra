---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-2"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://charts.jetstack.io
    chart: cert-manager
    # v1.15 only supports k8s <=1.30; bumped to 1.18 (supports 1.30-1.33) ahead
    # of the k3s upgrade to 1.31/1.32. CRDs are clean (no selectableFields).
    targetRevision: v1.18.6
    helm:
      valuesObject:
        crds:
          enabled: true
        replicaCount: 1
        # Route HTTP-01 self-checks to the edge node's internal IP so the
        # controller does not have to hairpin through the public IP. Without
        # this the self-check times out and certificates never issue.
        hostAliases:
          - ip: "10.20.0.240"
            hostnames:
              - staging.blue-skysolutions.com
              - staging.dispatchr.social
              - staging.jlshaw.link
              - staging.coreyalan.com
              - staging.capturly.app
        resources:
          requests:
            cpu: 15m
            memory: 128Mi
          limits:
            cpu: 250m
            memory: 256Mi
        cainjector:
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 512Mi
        webhook:
          resources:
            requests:
              cpu: 15m
              memory: 128Mi
            limits:
              cpu: 250m
              memory: 256Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: cert-manager
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
