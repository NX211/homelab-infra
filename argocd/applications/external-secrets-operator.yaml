---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: external-secrets-operator
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    # Use official External Secrets Helm chart
    repoURL: https://charts.external-secrets.io
    chart: external-secrets
    # PR1 of the v1beta1->v1 API migration: jump to latest 2.6.0 (matches the
    # target for prod) while keeping the deprecated v1beta1 API served, so the
    # existing v1beta1 manifests keep working untouched. PR2 migrates the
    # manifests to v1 and flips unsafeServeV1Beta1 to false.
    targetRevision: 2.6.0
    helm:
      valuesObject:
        crds:
          enabled: true
          # Serve BOTH v1 and v1beta1 during the migration (PR2 -> false).
          unsafeServeV1Beta1: true

        resources:
          requests:
            cpu: 50m
            memory: 128Mi
          limits:
            cpu: 200m
            memory: 256Mi

        webhook:
          create: true
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 100m
              memory: 128Mi

        replicaCount: 1

        securityContext:
          runAsNonRoot: true
          runAsUser: 65534

        podSecurityContext:
          fsGroup: 65534

        bitwarden-sdk-server:
          enabled: true

  destination:
    server: https://kubernetes.default.svc
    namespace: external-secrets-system

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # ESO CRDs are large; server-side apply avoids the client-side
      # last-applied-configuration annotation size limit.
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
