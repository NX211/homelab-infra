---
# Strict supply-chain policies scoped to the business plane only (personal
# services run many registries and unsigned images — out of scope). AUDIT first;
# graduate to Enforce once policy-reporter shows the business namespaces clean.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno-policies-business
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
    # Server-Side Diff for this app only: server-side dry-run apply so
    # apiserver/webhook defaulting stops reading as false drift (with the
    # field-manager ignoreDifferences in argocd-cm). Not global (see argocd values).
    argocd.argoproj.io/compare-options: ServerSideDiff=true
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: main
    path: kyverno-policies-business
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  # Kyverno mutates its own policies (defaults + autogen) via its SSA field
  # manager, which ArgoCD would otherwise flag as perpetual drift. Ignore the
  # fields Kyverno owns; we still manage everything we set.
  ignoreDifferences:
    - group: kyverno.io
      kind: ClusterPolicy
      managedFieldsManagers:
        - kyverno
