---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: lidarr
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: lidarr=lscr.io/linuxserver/lidarr
    # LinuxServer tags are not valid semver (4-part + -lsNNN). Track by build date.
    argocd-image-updater.argoproj.io/lidarr.update-strategy: newest-build
    argocd-image-updater.argoproj.io/lidarr.allow-tags: regexp:^[\d.]+-ls\d+$
    argocd-image-updater.argoproj.io/lidarr.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/lidarr.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: helm-charts/lidarr
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
