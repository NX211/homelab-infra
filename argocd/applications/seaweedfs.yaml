---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seaweedfs
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: helm-charts/seaweedfs
  destination:
    server: https://kubernetes.default.svc
    namespace: seaweedfs
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
  # Ignore fields that the cluster fills in after apply (immutable on
  # StatefulSet.volumeClaimTemplates, defaulted by the ESO admission webhook on
  # ExternalSecret). Without these, ArgoCD would show permanent OutOfSync drift.
  ignoreDifferences:
    - group: apps
      kind: StatefulSet
      jsonPointers:
        - /spec/volumeClaimTemplates
    - group: external-secrets.io
      kind: ExternalSecret
      jsonPointers:
        - /spec/data
        - /spec/target/deletionPolicy
        - /spec/target/template/mergePolicy
