---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: seerr-plex
  namespace: argocd
  annotations:
    # Image auto-update lives on this instance only; it writes the shared
    # helm-charts/seerr values, so seerr-jellyfin picks up the same bump.
    argocd-image-updater.argoproj.io/image-list: seerr=ghcr.io/seerr-team/seerr
    argocd-image-updater.argoproj.io/seerr.update-strategy: semver
    argocd-image-updater.argoproj.io/seerr.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/seerr.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: helm-charts/seerr
    helm:
      releaseName: seerr-plex
      valuesObject:
        ingress:
          host: request.authoritah.com
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
