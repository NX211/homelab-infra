---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sonarr
  namespace: argocd
  annotations:
    # Auto-update Sonarr to latest stable version
    argocd-image-updater.argoproj.io/image-list: sonarr=lscr.io/linuxserver/sonarr
    # LinuxServer tags (e.g. 4.0.17.2952-ls313) are not valid semver — 4-part
    # version + -lsNNN build suffix. Use newest-build (order by build date) and
    # restrict to clean release tags (excludes latest/develop/arch-prefixed).
    argocd-image-updater.argoproj.io/sonarr.update-strategy: newest-build
    argocd-image-updater.argoproj.io/sonarr.allow-tags: regexp:^[\d.]+-ls\d+$
    argocd-image-updater.argoproj.io/sonarr.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/sonarr.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: helm-charts/sonarr
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
