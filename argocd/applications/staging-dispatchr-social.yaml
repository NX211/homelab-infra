---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Name follows the `staging-<prod-app-name>` convention so the
  # staging-promote.yml workflow (`ARGO_APP="staging-${APP_NAME}"`),
  # the gitops-trigger STAGING_APP_MAP, and the PR branch naming all
  # line up without per-app special cases. Mismatched naming previously
  # caused staging-promote.yml to poll a non-existent Application forever.
  name: staging-dispatchr-social
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  annotations:
    # Subscribe this app to the staging→prod promotion webhook. When the
    # app transitions to Healthy+Synced, ArgoCD notifications will POST
    # the currently-running image list to gitops-trigger /promote which
    # dispatches the corresponding prod image-push event.
    notifications.argoproj.io/subscribe.on-staging-deployed.gitops-trigger-promote: ""
    # Name of the prod-side Application/appMap entry this staging app
    # promotes to. gitops-trigger keys its pendingPromotion ledger by the
    # prod app name, so the notification template has to forward it.
    promotion.gitops-trigger/prod-app-name: "dispatchr-social"
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: staging-apps/dispatchr-social
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
