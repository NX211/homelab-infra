---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Name follows the `staging-<prod-app-name>` convention so the
  # staging-promote.yml workflow (`ARGO_APP="staging-${APP_NAME}"`),
  # the gitops-trigger STAGING_APP_MAP, and the PR branch naming all
  # line up without per-app special cases. Mismatched naming previously
  # caused staging-promote.yml to poll a non-existent Application forever.
  name: staging-dispatchr-social
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
  # Note: the previous `notifications.argoproj.io/subscribe.*` and
  # `promotion.gitops-trigger/prod-app-name` annotations have been
  # removed. They subscribed this app to the now-deleted
  # gitops-trigger /promote webhook, which was the second of two
  # parallel staging→prod promotion paths. Promotion is now handled
  # exclusively by the PR-closed `staging-promote.yml` workflow,
  # which polls ArgoCD directly and dispatches to platform-infra.
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: staging-apps/dispatchr-social
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
