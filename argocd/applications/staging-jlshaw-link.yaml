---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Name follows the `staging-<prod-app-name>` convention so the
  # staging-promote.yml workflow (`ARGO_APP="staging-${APP_NAME}"`),
  # the gitops-trigger STAGING_APP_MAP, and the PR branch naming all
  # line up without per-app special cases.
  name: staging-jlshaw-link
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: staging-apps/jlshaw-link
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
