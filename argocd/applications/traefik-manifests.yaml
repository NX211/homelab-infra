---
# Platform Traefik middlewares (default-headers, compression, rate limits,
# etc.) referenced by IngressRoutes across the cluster. Kept in their own
# Application because the `traefik` app installs the upstream chart directly
# and would prune any extra resources it doesn't ship. See
# traefik-manifests/middlewares.yaml for the full explanation.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik-manifests
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/nx211/homelab-infra.git
    targetRevision: main
    path: traefik-manifests
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
