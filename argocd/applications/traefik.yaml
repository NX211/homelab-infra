---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 39.0.2
    helm:
      valuesObject:
        # Disable version-check + anonymous usage (was globalArguments pre-v34).
        global:
          checkNewVersion: false
          sendAnonymousUsage: false

        # Deployment
        deployment:
          kind: Deployment
          replicas: 1

        # Single replica pinned to the one proxy node (yellowtalon), binding
        # hostPort 80/443. The chart default RollingUpdate (maxUnavailable:0,
        # maxSurge:1) deadlocks on every upgrade: the new pod can't bind the
        # hostPorts the old pod still holds, and the old pod won't terminate
        # until the new one is Ready -> ProgressDeadlineExceeded. Recreate tears
        # the old pod down first (brief ingress blip) so the new one gets the
        # ports. rollingUpdate must be nulled or k8s rejects it under Recreate.
        updateStrategy:
          type: Recreate
          rollingUpdate: null

        # Node selector - only yellowtalon has proxy role
        nodeSelector:
          node-role.kubernetes.io/proxy: "true"

        # Service
        service:
          type: ClusterIP

        # Container listens on 8000/8443 (non-privileged — the chart's hardened
        # securityContext drops NET_BIND_SERVICE). hostPort still binds 80/443 on
        # the proxy node via the CNI portmap.
        ports:
          web:
            port: 8000
            hostPort: 80
            http:
              redirections:
                entryPoint:
                  to: websecure
                  scheme: https
          websecure:
            port: 8443
            hostPort: 443
            http:
              tls:
                enabled: true

        # Logs
        logs:
          general:
            level: INFO
          access:
            enabled: true

        # Providers
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: true

        # Resources
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
