---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: traefik
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://traefik.github.io/charts
    chart: traefik
    targetRevision: 33.2.1
    helm:
      valuesObject:
        # Global arguments
        globalArguments:
          - "--global.checknewversion=false"
          - "--global.sendanonymoususage=false"

        # Deployment
        deployment:
          kind: Deployment
          replicas: 1

        # Node selector - only yellowtalon has proxy role
        nodeSelector:
          node-role.kubernetes.io/proxy: "true"

        # Service
        service:
          type: ClusterIP

        # Ports
        ports:
          web:
            port: 80
            hostPort: 80
            redirectTo:
              port: websecure
          websecure:
            port: 443
            hostPort: 443
            tls:
              enabled: true

        # Logs
        logs:
          general:
            level: INFO
          access:
            enabled: true

        # Providers
        providers:
          kubernetesCRD:
            enabled: true
            allowCrossNamespace: true
          kubernetesIngress:
            enabled: true

        # Resources
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
