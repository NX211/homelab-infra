---
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: transmission
  namespace: argocd
  annotations:
    argocd-image-updater.argoproj.io/image-list: transmission=lscr.io/linuxserver/transmission
    argocd-image-updater.argoproj.io/transmission.update-strategy: semver
    argocd-image-updater.argoproj.io/transmission.helm.image-name: image.repository
    argocd-image-updater.argoproj.io/transmission.helm.image-tag: image.tag
    argocd-image-updater.argoproj.io/write-back-method: git:secret:argocd/git-creds
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/NX211/homelab-infra.git
    targetRevision: HEAD
    path: helm-charts/transmission
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
