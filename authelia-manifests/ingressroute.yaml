---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: authelia
  namespace: default
  labels:
    app: authelia
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`login.authoritah.com`)
    kind: Rule
    services:
    - name: authelia
      port: 9091
  # Second portal host for multi-domain SSO — services on authoritah.tv redirect
  # here so their .tv session cookie is issued by a same-domain portal.
  - match: Host(`login.authoritah.tv`)
    kind: Rule
    services:
    - name: authelia
      port: 9091
  tls:
    secretName: authelia-manifests-tls
