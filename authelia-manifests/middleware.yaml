---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: default
  labels:
    app: authelia
spec:
  forwardAuth:
    # Domain-aware endpoint: Authelia selects the login portal per the request's
    # domain (authoritah.com → login.authoritah.com, authoritah.tv →
    # login.authoritah.tv) from session.cookies[]. A hardcoded ?rd= would pin
    # every app to one portal and break multi-domain SSO (.tv redirect loop).
    address: http://authelia:9091/api/authz/forward-auth
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
