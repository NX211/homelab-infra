---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: authelia
  namespace: default
  labels:
    app: authelia
spec:
  serviceName: authelia
  replicas: 1
  selector:
    matchLabels:
      app: authelia
  template:
    metadata:
      labels:
        app: authelia
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9959"
        prometheus.io/path: /metrics
    spec:
      priorityClassName: authelia-priority
      enableServiceLinks: false
      nodeSelector:
        kubernetes.io/hostname: yellowtalon

      securityContext:
        fsGroup: 65534
        fsGroupChangePolicy: OnRootMismatch

      containers:
      - name: authelia
        image: authelia/authelia:4.39.20
        imagePullPolicy: IfNotPresent

        securityContext:
          runAsUser: 65534
          runAsGroup: 65534
          runAsNonRoot: true
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: false
          capabilities:
            drop:
            - ALL

        env:
        - name: TZ
          value: America/Chicago
        # Enable the config template filter so {{ secret }} / {{ fileContent }}
        # in configuration.yml resolve from the mounted /secrets/* files.
        - name: X_AUTHELIA_CONFIG_FILTERS
          value: template

        ports:
        - name: http
          containerPort: 9091
          protocol: TCP
        - name: metrics
          containerPort: 9959
          protocol: TCP

        volumeMounts:
        - name: config
          mountPath: /config/configuration.yml
          subPath: configuration.yml
          readOnly: true
        - name: users
          mountPath: /config/users.yml
          subPath: users.yml
          readOnly: true
        - name: assets
          mountPath: /config/assets
          readOnly: true
        - name: oidc-keys
          mountPath: /secrets/oidc-keys
          readOnly: true
        # ESO-backed secret mounts consumed by the config's {{ secret }} refs
        - name: core-secrets
          mountPath: /secrets/core
          readOnly: true
        - name: oidc-secrets
          mountPath: /secrets/oidc
          readOnly: true
        - name: database-secrets
          mountPath: /secrets/database
          readOnly: true
        - name: smtp-secrets
          mountPath: /secrets/smtp
          readOnly: true
        - name: oidc-client-secrets
          mountPath: /secrets/oidc-clients
          readOnly: true
        - name: tmp
          mountPath: /tmp

        livenessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 30
          timeoutSeconds: 5
          failureThreshold: 3

        readinessProbe:
          httpGet:
            path: /api/health
            port: http
            scheme: HTTP
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: "1"
            memory: 1Gi

      volumes:
      # configuration.yml now comes from a ConfigMap (git-managed); secrets are
      # injected at load time by the template filter from the /secrets/* mounts.
      - name: config
        configMap:
          name: authelia-configuration
          defaultMode: 0400
      - name: core-secrets
        secret:
          secretName: authelia-secrets
          defaultMode: 0400
      - name: oidc-secrets
        secret:
          secretName: authelia-oidc
          defaultMode: 0400
      - name: database-secrets
        secret:
          secretName: authelia-database
          defaultMode: 0400
      - name: smtp-secrets
        secret:
          secretName: authelia-smtp
          defaultMode: 0400
      - name: oidc-client-secrets
        secret:
          secretName: authelia-oidc-clients
          defaultMode: 0400
      - name: users
        secret:
          secretName: authelia-users
          defaultMode: 0400
      - name: assets
        configMap:
          name: authelia-assets
          defaultMode: 0644
      - name: oidc-keys
        secret:
          secretName: authelia-oidc-keys
          defaultMode: 0400
      - name: tmp
        emptyDir: {}
