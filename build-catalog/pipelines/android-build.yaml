---
# Channel pipeline: android-build. Authored once here; every project consumes it
# from its .tekton/ PipelineRun via the git resolver + params (design §4). This
# is the TRUSTED-tier release flow: build signed AAB → in-cluster approval gate
# → keyless Play publish. Tekton Chains signs the PipelineRun for SLSA provenance
# automatically (configured cluster-side).
apiVersion: tekton.dev/v1
kind: Pipeline
metadata:
  name: android-build
  labels:
    app.kubernetes.io/part-of: build-catalog
spec:
  params:
    - name: git-url
      type: string
    - name: git-revision
      type: string
      default: ""
    - name: toolchain-image
      type: string
      default: ghcr.io/nx211/capturly-android-toolchain:0.1.0@sha256:e266bc15b6ad57bb6c913c9a60e666fa0014cf687f97134438bad2b12ecaaabb
    - name: package
      type: string
      default: app.capturly.mobile
    - name: track
      type: string
      default: alpha
    - name: approvers
      type: array
      default: ["corey"]
    - name: approvals-required
      type: string
      default: "1"
  workspaces:
    - name: source
    - name: gradle-cache
      optional: true
    - name: keystore
    - name: npmrc
    - name: gcp-wif
    - name: github-app # GitHub App creds (app-id, app-private-key) for a
      # short-lived clone token — no static git credential
  tasks:
    - name: clone
      workspaces:
        - name: output
          workspace: source
        - name: github-app
          workspace: github-app
      taskSpec:
        workspaces:
          - name: output
          - name: github-app
            mountPath: /github-app
        params: []
        steps:
          - name: git-clone
            # Toolchain image (openssl + python3 + curl + git pre-baked) so the
            # step runs non-root under set-security-context — no runtime apk add.
            image: $(params.toolchain-image)
            script: |
              #!/usr/bin/env bash
              # Clone the private repo with a ~1h GitHub App installation token
              # minted at build time — nothing long-lived in the pod. set -e but
              # never -x so the token is never echoed. JSON parsed with python3
              # (baked) instead of jq.
              set -euo pipefail

              APP_ID="$(cat /github-app/app-id)"
              b64url() { openssl base64 -A | tr '+/' '-_' | tr -d '='; }
              now=$(date +%s)
              hdr="$(printf '%s' '{"alg":"RS256","typ":"JWT"}' | b64url)"
              pld="$(printf '{"iat":%s,"exp":%s,"iss":"%s"}' "$((now-60))" "$((now+540))" "$APP_ID" | b64url)"
              sig="$(printf '%s' "$hdr.$pld" | openssl dgst -sha256 -sign /github-app/app-private-key -binary | b64url)"
              jwt="$hdr.$pld.$sig"

              slug="$(printf '%s' "$(params.git-url)" | sed -E 's#https?://github.com/##; s#\.git$##')"
              gh="https://api.github.com"
              inst="$(curl -sf -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "$gh/repos/$slug/installation" | python3 -c 'import sys,json;print(json.load(sys.stdin)["id"])')"
              token="$(curl -sf -X POST -H "Authorization: Bearer $jwt" -H "Accept: application/vnd.github+json" "$gh/app/installations/$inst/access_tokens" | python3 -c 'import sys,json;print(json.load(sys.stdin)["token"])')"

              cd "$(workspaces.output.path)"
              git clone "https://x-access-token:${token}@github.com/${slug}.git" .
              git remote set-url origin "https://github.com/${slug}.git"   # drop the token from .git/config
              [ -n "$(params.git-revision)" ] && git checkout "$(params.git-revision)" || true
    - name: build
      runAfter: [clone]
      taskRef:
        resolver: git
        params:
          - {name: url, value: 'https://github.com/NX211/homelab-infra.git'}
          - {name: revision, value: main}
          - {name: pathInRepo, value: build-catalog/tasks/build-signed-aab.yaml}
      params:
        - name: toolchain-image
          value: $(params.toolchain-image)
      workspaces:
        - {name: source, workspace: source}
        - {name: gradle-cache, workspace: gradle-cache}
        - {name: keystore, workspace: keystore}
        - {name: npmrc, workspace: npmrc}
    # ── Change-management gate (design §6, RISK-BUILD-001) ──────────────────
    # Blocks before publish until approvals-required approvers approve. Interim
    # Tech-Preview component; fail-closed by construction (absent approval → the
    # run stays pending, nothing publishes). VERIFY apiVersion/params against the
    # installed manual-approval-gate release before trusting a real release.
    - name: release-approval
      runAfter: [build]
      taskRef:
        apiVersion: openshift-pipelines.org/v1alpha1
        kind: ApprovalTask
      params:
        - name: approvers
          value: $(params.approvers)
        - name: numberOfApprovalsRequired
          value: $(params.approvals-required)
        - name: description
          value: "Approve Play release of $(params.package) to $(params.track)"
    - name: publish
      runAfter: [release-approval]
      taskRef:
        resolver: git
        params:
          - {name: url, value: 'https://github.com/NX211/homelab-infra.git'}
          - {name: revision, value: main}
          - {name: pathInRepo, value: build-catalog/tasks/play-publish.yaml}
      params:
        - name: toolchain-image
          value: $(params.toolchain-image)
        - name: package
          value: $(params.package)
        - name: track
          value: $(params.track)
        - name: aab-path
          value: $(tasks.build.results.aab-path)
      workspaces:
        - {name: source, workspace: source}
        - {name: gcp-wif, workspace: gcp-wif}
