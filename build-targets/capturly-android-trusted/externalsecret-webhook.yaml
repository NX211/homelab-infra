---
# HMAC secret the GitHub tag-push webhook signs with; the EventListener github
# interceptor validates it. Set the same value on the capturly.app repo webhook.
# (Git clone auth is handled by a short-lived GitHub App token — see
# externalsecret-github-app.yaml — so there is no static git credential.)
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: capturly-webhook
  namespace: capturly-builds-trusted
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-build-platform
    kind: ClusterSecretStore
  target:
    name: capturly-webhook
    creationPolicy: Owner
    template:
      engineVersion: v2
  data:
    - secretKey: webhook-secret
      remoteRef: { key: 06a03bb9-88d3-4076-9302-b48d0154f9b6 }  # CAPTURLY_TEKTON_TRUSTED_WEBHOOK_SECRET (moved to Build Platform)
