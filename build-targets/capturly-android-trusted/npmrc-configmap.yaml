---
# .npmrc pointing the trusted Android build's pnpm install at the Verdaccio proxy
# — NO auth token in the pod. The proxy holds the org npm read token and fetches
# private @corey-alan-consulting packages from npmjs (same as the untrusted tier).
# Removes the need for a per-tier npm secret entirely. Mounted as the `npmrc`
# workspace by the android-build pipeline.
apiVersion: v1
kind: ConfigMap
metadata:
  name: capturly-trusted-npmrc
  namespace: capturly-builds-trusted
data:
  .npmrc: |
    registry=http://verdaccio.build-registry-proxy.svc.cluster.local:4873/
    @corey-alan-consulting:registry=http://verdaccio.build-registry-proxy.svc.cluster.local:4873/
