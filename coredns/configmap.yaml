---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns
  namespace: kube-system
data:
  Corefile: |
    .:53 {
        errors
        health {
           lameduck 5s
        }
        ready
        kubernetes cluster.local in-addr.arpa ip6.arpa {
          pods insecure
          fallthrough in-addr.arpa ip6.arpa
        }
        hosts /etc/coredns/CustomHosts {
          ttl 60
          reload 15s
          fallthrough
        }
        prometheus :9153
        forward . /etc/resolv.conf
        cache 30
        loop
        reload
        loadbalance
    }
  CustomHosts: |
    # Node hostnames
    10.20.0.210 greytalon
    10.20.0.250 blacktalon
    10.20.0.240 yellowtalon
    10.20.0.230 redtalon

    # Internal DNS overrides - Traefik ClusterIP for homelab domains
    # This enables split-horizon DNS so internal traffic routes correctly
    # and cert-manager HTTP-01 challenges can self-check
    10.43.5.100 authoritah.com
