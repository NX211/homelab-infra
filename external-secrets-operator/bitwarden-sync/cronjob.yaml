---
# CronJob to sync Bitwarden secrets to Kubernetes
apiVersion: batch/v1
kind: CronJob
metadata:
  name: bitwarden-sync
  namespace: secrets-vault
spec:
  # Run every 15 minutes
  schedule: "*/15 * * * *"
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app: bitwarden-sync
        spec:
          serviceAccountName: bitwarden-sync
          restartPolicy: OnFailure
          containers:
            - name: sync
              # Pinned by digest so the base image can't change under us.
              image: debian:bookworm-slim@sha256:60eac759739651111db372c07be67863818726f754804b8707c90979bda511df
              command: ["/bin/bash"]
              args: ["/scripts/sync.sh"]
              env:
                - name: BWS_ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: bitwarden-credentials
                      key: token
              securityContext:
                allowPrivilegeEscalation: false
                seccompProfile:
                  type: RuntimeDefault
              resources:
                requests:
                  cpu: 50m
                  memory: 64Mi
                limits:
                  cpu: 500m
                  memory: 256Mi
              volumeMounts:
                - name: sync-script
                  mountPath: /scripts
          volumes:
            - name: sync-script
              configMap:
                name: bitwarden-sync-script
                defaultMode: 0755
