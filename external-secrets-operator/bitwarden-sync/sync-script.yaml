---
# ConfigMap containing the sync script
apiVersion: v1
kind: ConfigMap
metadata:
  name: bitwarden-sync-script
  namespace: secrets-vault
data:
  sync.sh: |
    #!/bin/bash
    set -euo pipefail

    # Pinned tooling. Downloads are verified against these checksums and the job
    # fails closed on mismatch, so a tampered/compromised artifact cannot run.
    KUBECTL_VERSION="v1.32.1"
    KUBECTL_SHA256="e16c80f1a9f94db31063477eb9e61a2e24c1a4eee09ba776b029048f5369db0c"
    BWS_VERSION="0.4.0"
    BWS_SHA256="3b9514050e680c0bb2497f8bc6d1cd90e6a00c81db69867af251fab6c142814d"

    echo "=== Bitwarden to Kubernetes Secret Sync ==="
    echo "Starting sync at $(date)"

    # Check if BWS_ACCESS_TOKEN is set
    if [ -z "${BWS_ACCESS_TOKEN:-}" ]; then
      echo "ERROR: BWS_ACCESS_TOKEN not set"
      exit 1
    fi

    # Install dependencies
    if ! command -v kubectl &> /dev/null; then
      echo "Installing dependencies..."
      apt-get update -qq > /dev/null 2>&1
      apt-get install -y -qq curl unzip jq > /dev/null 2>&1

      # Install kubectl (version-pinned + checksum-verified)
      curl -fsSLO "https://dl.k8s.io/release/${KUBECTL_VERSION}/bin/linux/amd64/kubectl"
      echo "${KUBECTL_SHA256}  kubectl" | sha256sum -c -
      chmod +x kubectl
      mv kubectl /usr/local/bin/
      echo "✓ kubectl ${KUBECTL_VERSION} installed"
    fi

    # Install bws CLI if not present (version-pinned + checksum-verified)
    if ! command -v bws &> /dev/null; then
      echo "Installing Bitwarden Secrets CLI..."
      cd /tmp
      curl -fsSLO "https://github.com/bitwarden/sdk/releases/download/bws-v${BWS_VERSION}/bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
      echo "${BWS_SHA256}  bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip" | sha256sum -c -
      unzip -o "bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
      chmod +x bws
      mv bws /usr/local/bin/
      rm "bws-x86_64-unknown-linux-gnu-${BWS_VERSION}.zip"
      cd -
      echo "✓ bws ${BWS_VERSION} installed"
    fi

    # List all secrets from Bitwarden
    echo "Fetching secrets from Bitwarden..."
    SECRETS=$(bws secret list --output json || echo "[]")

    if [ "$SECRETS" = "[]" ]; then
      echo "WARNING: No secrets found in Bitwarden"
      exit 0
    fi

    # Parse secrets and create/update Kubernetes secrets
    echo "$SECRETS" | jq -c '.[]' | while read -r secret; do
      SECRET_KEY=$(echo "$secret" | jq -r '.key')
      SECRET_VALUE=$(echo "$secret" | jq -r '.value')
      SECRET_ID=$(echo "$secret" | jq -r '.id')

      # Convert secret key to valid Kubernetes secret name (lowercase, alphanumeric + hyphens)
      K8S_SECRET_NAME=$(echo "$SECRET_KEY" | tr '[:upper:]' '[:lower:]' | tr '_' '-')

      echo "Processing: $SECRET_KEY -> k8s secret: $K8S_SECRET_NAME"

      # Create or update the secret
      kubectl create secret generic "$K8S_SECRET_NAME" \
        --from-literal=value="$SECRET_VALUE" \
        --from-literal=bws-id="$SECRET_ID" \
        --namespace=secrets-vault \
        --dry-run=client -o yaml | kubectl apply -f -

      echo "✓ Synced: $K8S_SECRET_NAME"
    done

    echo "=== Sync completed at $(date) ==="
