---
# ClusterSecretStore for Bitwarden Staging Secrets
# Scoped to staging Bitwarden projects for staging app secrets
apiVersion: external-secrets.io/v1beta1
kind: ClusterSecretStore
metadata:
  name: bitwarden-staging
spec:
  provider:
    bitwardensecretsmanager:
      auth:
        secretRef:
          credentials:
            name: bitwarden-staging-credentials
            namespace: external-secrets-system
            key: token
      apiURL: https://api.bitwarden.com
      identityURL: https://identity.bitwarden.com
      bitwardenServerSDKURL: https://bitwarden-sdk-server.external-secrets-system.svc.cluster.local:9998
      organizationID: "4650c1c8-8d22-4073-8a7d-b3cf011d5ff2"
      projectID: "2339785b-1aff-45ca-bd1e-b42200fc7070"
      caProvider:
        type: Secret
        name: bitwarden-sdk-server-tls
        namespace: external-secrets-system
        key: ca.crt
