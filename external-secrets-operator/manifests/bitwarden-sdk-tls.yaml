---
# Self-signed issuer for Bitwarden SDK server internal TLS
apiVersion: cert-manager.io/v1
kind: Issuer
metadata:
  name: bitwarden-sdk-selfsign
  namespace: external-secrets-system
spec:
  selfSigned: {}
---
# TLS certificate for the Bitwarden SDK server
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: bitwarden-sdk-server-tls
  namespace: external-secrets-system
spec:
  secretName: bitwarden-tls-certs
  issuerRef:
    name: bitwarden-sdk-selfsign
    kind: Issuer
  dnsNames:
    - bitwarden-sdk-server
    - bitwarden-sdk-server.external-secrets-system
    - bitwarden-sdk-server.external-secrets-system.svc
    - bitwarden-sdk-server.external-secrets-system.svc.cluster.local
  duration: 8760h # 1 year
  renewBefore: 720h # 30 days
