---
# ArgoCD notifications secret — pulls the shared bearer token for the
# gitops-trigger /promote webhook. The value is synced from Bitwarden
# (Workbench project) → secrets-vault namespace by the bitwarden-sync
# cronjob, then mirrored here via the kubernetes-backend ClusterSecretStore.
#
# Templates in argocd-notifications-cm access this value as
# `.secret.promote-token` (the secret key below).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: argocd-notifications-secret
  namespace: argocd
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-backend
    kind: ClusterSecretStore
  target:
    name: argocd-notifications-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
  data:
    - secretKey: promote-token
      remoteRef:
        key: gitops-trigger-promote-hmac-secret
        property: value
