# ArgoCD Helm Chart Configuration
# Wraps the official argo-cd chart for homelab k3s cluster

# Ingress configuration (managed by this wrapper chart)
ingress:
  enabled: true
  host: cd.authoritah.com
  clusterIssuer: letsencrypt-prod

argo-cd:
  # Global settings
  global:
    domain: cd.authoritah.com

  # Configuration
  configs:
    cm:
      # Repository timeout
      timeout.reconciliation: 180s
      # Enable API key generation for admin account
      accounts.admin: apiKey, login
      # Argo ships no built-in health assessment for the CloudNativePG Cluster
      # CR, so the `postgresql` app perpetually reported "Unknown" health even
      # while the database was up. This Lua check reads the CR's `Ready`
      # condition so the app reflects real state (Healthy/Degraded).
      resource.customizations.health.postgresql.cnpg.io_Cluster: |
        local hs = {}
        if obj.status ~= nil and obj.status.conditions ~= nil then
          for i, condition in ipairs(obj.status.conditions) do
            if condition.type == "Ready" and condition.status == "True" then
              hs.status = "Healthy"
              hs.message = condition.message
              return hs
            end
            if condition.type == "Ready" and condition.status == "False" then
              hs.status = "Degraded"
              hs.message = condition.message
              return hs
            end
          end
        end
        hs.status = "Progressing"
        hs.message = "Waiting for CloudNativePG cluster to report Ready"
        return hs
      # Argo's built-in PVC check reports Pending as Progressing and does not
      # honour WaitForFirstConsumer, so a local-path PVC (the cluster's only SC,
      # WFFC) that legitimately waits for its first consumer pins the owning app
      # in Progressing forever (e.g. the gradle-cache on a build namespace before
      # any build runs). Treat a Pending local-path PVC as Healthy; leave every
      # other state at Argo's default assessment.
      resource.customizations.health.PersistentVolumeClaim: |
        local hs = {}
        if obj.status ~= nil and obj.status.phase == "Pending"
           and obj.spec.storageClassName == "local-path" then
          hs.status = "Healthy"
          hs.message = "WaitForFirstConsumer: binds on first consumer"
          return hs
        end
        if obj.status ~= nil and obj.status.phase == "Bound" then
          hs.status = "Healthy"
          return hs
        end
        if obj.status ~= nil and obj.status.phase == "Lost" then
          hs.status = "Degraded"
          hs.message = "PVC lost its bound volume"
          return hs
        end
        hs.status = "Progressing"
        hs.message = "Waiting for PVC to bind"
        return hs
      # Server-side defaulting that Argo flags as drift on healthy apps. Each
      # entry suppresses ONLY cosmetic diffs (ignoreDifferences can never create
      # drift), keyed by the SSA field manager that owns the defaulted fields
      # where possible so it stays comprehensive as the objects evolve.
      #
      # ESO writes remoteRef.{conversion,decoding}Strategy / metadataPolicy /
      # nullBytePolicy, target.deletionPolicy, template.mergePolicy on every
      # ExternalSecret (build-registry-proxy, tekton-pac, the build fleet).
      resource.customizations.ignoreDifferences.external-secrets.io_ExternalSecret: |
        managedFieldsManagers:
          - external-secrets
      # Kyverno's controller defaults admission/emitWarning and writes
      # status.autogen back onto every ClusterPolicy (kyverno-policies*).
      resource.customizations.ignoreDifferences.kyverno.io_ClusterPolicy: |
        managedFieldsManagers:
          - kyverno
      # The apiserver defaults spec.conversion:{strategy:None} onto CRDs whose
      # manifests omit it (tekton-operator, kyverno, manual-approval-gate); it is
      # not tracked under a field manager, so ignore the path. Also covers the
      # cert-manager cainjector caBundle churn — both are diffs we never act on.
      resource.customizations.ignoreDifferences.apiextensions.k8s.io_CustomResourceDefinition: |
        jqPathExpressions:
          - .spec.conversion
      # The Job controller injects immutable batch.kubernetes.io/controller-uid
      # selector + template labels (kyverno-migrate-resources).
      resource.customizations.ignoreDifferences.batch_Job: |
        jqPathExpressions:
          - .spec.selector
          - .spec.template.metadata.labels

    params:
      # Run server without TLS (Traefik handles TLS termination)
      server.insecure: true

  # Application Controller - manages application state
  controller:
    replicas: 1
    resources:
      requests:
        cpu: 250m
        memory: 1Gi
      limits:
        cpu: 1000m
        memory: 2Gi

  # API Server - UI and API endpoint
  server:
    replicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

    # Run in insecure mode since Traefik handles TLS termination
    extraArgs:
      - --insecure

    # Ingress handled by wrapper chart templates (certificate.yaml + ingressroute.yaml)
    ingress:
      enabled: false

  # Repo Server - clones and renders manifests
  repoServer:
    replicas: 1
    resources:
      requests:
        cpu: 100m
        memory: 256Mi
      limits:
        cpu: 1000m
        memory: 1Gi

  # ApplicationSet Controller - manages ApplicationSets
  applicationSet:
    replicas: 1
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Notifications Controller - sends notifications
  notifications:
    enabled: true
    resources:
      requests:
        cpu: 25m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

    # The argocd-notifications-secret is populated by ExternalSecret (see
    # templates/externalsecret-notifications.yaml), not by the Helm chart.
    secret:
      create: false

    # Webhook service definition — called by the gitops-trigger-promote
    # notifier below. Bearer token is read from the notifications secret
    # at template evaluation time via `.secret.promote-token`.
    notifiers:
      service.webhook.gitops-trigger-promote: |
        url: https://gitops-trigger.coreyalan.com/promote
        headers:
          - name: Content-Type
            value: application/json
          - name: Authorization
            value: "Bearer $promote-token"

    # Message templates
    templates:
      # Posts the currently-rolled-out image refs to gitops-trigger
      # /promote so it can dispatch the deferred prod image-push event
      # for any matching pending promotion. The prod app name comes from
      # the staging Application's promotion.gitops-trigger/prod-app-name
      # annotation so staging and prod app names don't have to match.
      template.app-promote: |
        webhook:
          gitops-trigger-promote:
            method: POST
            body: |
              {
                "appName": "{{ index .app.metadata.annotations "promotion.gitops-trigger/prod-app-name" }}",
                "images": {{ .app.status.summary.images | toJson }}
              }

    # Trigger conditions — fire the promotion webhook once per Git
    # revision whenever a staging-* app reaches Healthy + Synced and has
    # the prod-app-name annotation set. `oncePer` keyed on the sync
    # revision prevents us from re-promoting on every reconcile.
    triggers:
      trigger.on-staging-deployed: |
        - when: >-
            app.metadata.name matches '^staging-.*'
            and app.status.health.status == 'Healthy'
            and app.status.sync.status == 'Synced'
            and app.metadata.annotations != nil
            and app.metadata.annotations["promotion.gitops-trigger/prod-app-name"] != ""
          send: [app-promote]
          oncePer: app.status.sync.revision

    # Intentionally no default subscriptions — apps opt in via annotation:
    #   notifications.argoproj.io/subscribe.on-staging-deployed.gitops-trigger-promote: ""
    # See argocd/applications/staging-dispatchr.yaml for the pattern.
    subscriptions: []

  # Dex - OAuth/SSO (disabled, using Authelia instead)
  dex:
    enabled: false

  # Redis - caching
  redis:
    enabled: true
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 100m
        memory: 128Mi

  # Disable high availability components (homelab doesn't need HA)
  redis-ha:
    enabled: false
