---
# ForwardAuth middleware for protecting other services
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: authelia-forwardauth
  namespace: {{ .Release.Namespace }}
  labels:
    app: authelia
spec:
  forwardAuth:
    # Domain-aware endpoint — Authelia picks the portal per request domain from
    # session.cookies[]. Do not hardcode ?rd= (breaks multi-domain SSO).
    address: http://authelia:{{ .Values.service.httpPort }}/api/authz/forward-auth
    trustForwardHeader: true
    authResponseHeaders:
      - Remote-User
      - Remote-Groups
      - Remote-Name
      - Remote-Email
