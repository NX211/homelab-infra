{{- if eq .Values.tier "trusted" }}
---
# GitHub App credentials for the trusted clone — the dedicated **build** App
# (Contents:read only, separate from the PaC webhook App, H4). The clone task
# mints a short-lived (~1h) installation token from these at build time, so there
# is NO static git credential and the token carries only clone scope. Mounted as
# the `github-app` workspace.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.project }}-github-app
  namespace: {{ include "bn.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.githubApp.store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.project }}-github-app
    creationPolicy: Owner
    template:
      engineVersion: v2
  data:
    - secretKey: app-id
      remoteRef: { key: {{ .Values.githubApp.appIdKey }} }         # BUILD_APP_ID (Contents:read-only App)
    - secretKey: app-private-key
      remoteRef: { key: {{ .Values.githubApp.privateKeyKey }} }    # BUILD_APP_PRIVATE_KEY
---
# HMAC secret the GitHub tag-push webhook signs with; the EventListener github
# interceptor validates it. Set the same value on the {{ .Values.repo }} webhook.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.project }}-webhook
  namespace: {{ include "bn.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.webhook.store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.project }}-webhook
    creationPolicy: Owner
    template:
      engineVersion: v2
  data:
    - secretKey: webhook-secret
      remoteRef: { key: {{ .Values.webhook.secretKey }} }
{{- if .Values.signing.keys }}
---
# Channel signing material ({{ .Values.channel }}), synced into the
# `{{ .Values.project }}-{{ .Values.channel }}-signing` secret and mounted as the
# `keystore` workspace. Uses the project-scoped store so the UUIDs resolve.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.project }}-{{ .Values.channel }}-signing
  namespace: {{ include "bn.namespace" . }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: {{ .Values.signing.store }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.project }}-{{ .Values.channel }}-signing
    creationPolicy: Owner
    template:
      engineVersion: v2
  data:
{{- range .Values.signing.keys }}
    - secretKey: {{ .secretKey }}
      remoteRef: { key: {{ .remoteRef }} }{{ if .comment }}  # {{ .comment }}{{ end }}
{{- end }}
{{- end }}
{{- end }}
