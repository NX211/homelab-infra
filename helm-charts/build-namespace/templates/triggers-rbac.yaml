{{- if eq .Values.tier "trusted" }}
---
# ServiceAccount + RBAC for the EventListener sink: it must read Trigger CRs and
# create PipelineRuns in this namespace. Binds the ClusterRoles the Tekton
# Triggers install ships. The namespaced RoleBinding grants create/read in this
# namespace only; the ClusterRoleBinding is the (required) cluster interceptor +
# clustertriggerbinding *read* — the residual documented under H5.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "bn.triggerSA" . }}
  namespace: {{ include "bn.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "bn.triggerSA" . }}-eventlistener
  namespace: {{ include "bn.namespace" . }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-roles
subjects:
  - kind: ServiceAccount
    name: {{ include "bn.triggerSA" . }}
    namespace: {{ include "bn.namespace" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "bn.triggerSA" . }}-eventlistener-clusterroles
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: tekton-triggers-eventlistener-clusterroles
subjects:
  - kind: ServiceAccount
    name: {{ include "bn.triggerSA" . }}
    namespace: {{ include "bn.namespace" . }}
{{- end }}
