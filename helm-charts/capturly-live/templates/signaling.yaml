---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "capturly-live.fullname" . }}-signaling
  labels:
    app.kubernetes.io/name: capturly-live-signaling
    {{- include "capturly-live.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: capturly-live-signaling
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: capturly-live-signaling
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      enableServiceLinks: false
      containers:
      - name: signaling
        image: "{{ .Values.signaling.image.repository }}:{{ .Values.signaling.image.tag }}"
        imagePullPolicy: {{ .Values.signaling.image.pullPolicy }}
        env:
        - name: PORT
          value: {{ .Values.signaling.service.port | quote }}
        ports:
        - name: http
          containerPort: {{ .Values.signaling.service.port }}
          protocol: TCP
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 5
          periodSeconds: 5
          failureThreshold: 1
        resources:
          {{- toYaml .Values.signaling.resources | nindent 10 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "capturly-live.fullname" . }}-signaling
  labels:
    app.kubernetes.io/name: capturly-live-signaling
    {{- include "capturly-live.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.signaling.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: capturly-live-signaling
    app.kubernetes.io/instance: {{ .Release.Name }}
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "capturly-live.fullname" . }}-signaling
  labels:
    app.kubernetes.io/name: capturly-live-signaling
    {{- include "capturly-live.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`{{ .Values.signaling.host }}`)
    kind: Rule
    services:
    - name: {{ include "capturly-live.fullname" . }}-signaling
      port: {{ .Values.signaling.service.port }}
  tls:
    secretName: {{ include "capturly-live.fullname" . }}-signaling-tls
---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "capturly-live.fullname" . }}-signaling-tls
  labels:
    app.kubernetes.io/name: capturly-live-signaling
    {{- include "capturly-live.labels" . | nindent 4 }}
spec:
  secretName: {{ include "capturly-live.fullname" . }}-signaling-tls
  issuerRef:
    name: {{ .Values.clusterIssuer }}
    kind: ClusterIssuer
  dnsNames:
    - {{ .Values.signaling.host }}
