# Capturly Live Helm Chart Values
#
# Three components:
#   web       - static VDO.Ninja fork (nginx) at live.capturly.app
#   signaling - websocket handshake server at wss.live.capturly.app
#   coturn    - TURN relay at turn.live.capturly.app. Media UDP bypasses
#               Traefik: hostNetwork on the proxy node, UniFi-forward
#               3478/udp+tcp, 5349/tcp and the relay range to the node.

clusterIssuer: letsencrypt-prod

web:
  host: live.capturly.app
  image:
    repository: ghcr.io/corey-alan-consulting/live.capturly.app
    tag: "latest"  # Updated by CI/CD to a sha tag once the publish workflow runs
    pullPolicy: Always
  service:
    port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 32Mi
    limits:
      cpu: 200m
      memory: 128Mi

signaling:
  host: wss.live.capturly.app
  image:
    repository: ghcr.io/corey-alan-consulting/capturly-live-signaling
    tag: "latest"  # Updated by CI/CD to a sha tag once the publish workflow runs
    pullPolicy: Always
  service:
    port: 8080
  resources:
    requests:
      cpu: 25m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi

coturn:
  enabled: true
  host: turn.live.capturly.app
  image:
    repository: coturn/coturn
    tag: "4.6.3-alpine"
    pullPolicy: IfNotPresent
  # Public IP guests reach the relay on (UniFi WAN). If relay candidates
  # come out wrong, use the "public/private" form with the proxy node's
  # LAN IP, e.g. "206.225.142.166/192.168.x.y".
  externalIp: "206.225.142.166"
  listeningPort: 3478
  tlsListeningPort: 5349
  relayPortMin: 49160
  relayPortMax: 49200
  # Static long-term credentials. These necessarily ship to browsers in the
  # fork's index.html, so they are public by design; abuse is bounded by the
  # quotas and denied peer ranges in the coturn config.
  authUser: capturlylive
  authPassword: e22ecea76cabc3bca00babcd
  # Pin to the proxy node (public traffic ingress) for hostNetwork/hostPort.
  nodeSelector:
    node-role.kubernetes.io/proxy: "true"
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: "1"
      memory: 512Mi
