---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.fullname" . }}
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "immich.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "immich.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: immich
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        env:
        - name: TZ
          value: {{ .Values.env.TZ | quote }}
        - name: DB_HOSTNAME
          value: {{ .Values.env.DB_HOSTNAME | quote }}
        - name: DB_PORT
          value: {{ .Values.env.DB_PORT | quote }}
        - name: DB_DATABASE_NAME
          value: {{ .Values.env.DB_DATABASE_NAME | quote }}
        - name: DB_USERNAME
          value: {{ .Values.env.DB_USERNAME | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.env.DB_PASSWORD | quote }}
        - name: REDIS_HOSTNAME
          value: {{ .Values.env.REDIS_HOSTNAME | quote }}
        - name: IMMICH_MACHINE_LEARNING_URL
          value: {{ .Values.env.IMMICH_MACHINE_LEARNING_URL | quote }}
        volumeMounts:
        - name: upload
          mountPath: /usr/src/app/upload
        {{- if .Values.persistence.config.enabled }}
        - name: config
          mountPath: /config
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: upload
        persistentVolumeClaim:
          claimName: {{ include "immich.fullname" . }}-upload
      {{- if .Values.persistence.config.enabled }}
      - name: config
        persistentVolumeClaim:
          claimName: {{ include "immich.fullname" . }}-config
      {{- end }}
