---
{{- if .Values.machineLearning.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.fullname" . }}-machine-learning
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: machine-learning
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "immich.name" . }}-machine-learning
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "immich.name" . }}-machine-learning
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: machine-learning
        image: "{{ .Values.machineLearning.image.repository }}:{{ .Values.machineLearning.image.tag }}"
        imagePullPolicy: {{ .Values.machineLearning.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.machineLearning.service.port }}
          protocol: TCP
        env:
        - name: TZ
          value: {{ .Values.env.TZ | quote }}
        - name: DB_HOSTNAME
          value: {{ .Values.env.DB_HOSTNAME | quote }}
        - name: DB_PORT
          value: {{ .Values.env.DB_PORT | quote }}
        - name: DB_DATABASE_NAME
          value: {{ .Values.env.DB_DATABASE_NAME | quote }}
        - name: DB_USERNAME
          value: {{ .Values.env.DB_USERNAME | quote }}
        - name: DB_PASSWORD
          value: {{ .Values.env.DB_PASSWORD | quote }}
        - name: REDIS_HOSTNAME
          value: {{ .Values.env.REDIS_HOSTNAME | quote }}
        volumeMounts:
        - name: model-cache
          mountPath: /cache
        resources:
          {{- toYaml .Values.machineLearning.resources | nindent 10 }}
      volumes:
      - name: model-cache
        persistentVolumeClaim:
          claimName: {{ include "immich.fullname" . }}-model-cache
{{- end }}
