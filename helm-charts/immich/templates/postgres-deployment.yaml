---
{{- if .Values.postgres.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "immich.fullname" . }}-postgres
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgres
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "immich.name" . }}-postgres
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "immich.name" . }}-postgres
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: postgres
        image: "{{ .Values.postgres.image.repository }}:{{ .Values.postgres.image.tag }}"
        imagePullPolicy: {{ .Values.postgres.image.pullPolicy }}
        ports:
        - name: postgres
          containerPort: {{ .Values.postgres.service.port }}
          protocol: TCP
        env:
        - name: POSTGRES_USER
          value: {{ .Values.postgres.env.POSTGRES_USER | quote }}
        - name: POSTGRES_PASSWORD
          value: {{ .Values.postgres.env.POSTGRES_PASSWORD | quote }}
        - name: POSTGRES_DB
          value: {{ .Values.postgres.env.POSTGRES_DB | quote }}
        - name: POSTGRES_INITDB_ARGS
          value: {{ .Values.postgres.env.POSTGRES_INITDB_ARGS | quote }}
        volumeMounts:
        - name: data
          mountPath: /var/lib/postgresql/data
        - name: dshm
          mountPath: /dev/shm
        resources:
          {{- toYaml .Values.postgres.resources | nindent 10 }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "immich.fullname" . }}-postgres-data
      - name: dshm
        emptyDir:
          medium: Memory
{{- end }}
