---
{{- if .Values.persistence.upload.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immich.fullname" . }}-upload
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.upload.storageClass }}
  storageClassName: {{ .Values.persistence.upload.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.upload.size }}
{{- end }}
---
{{- if .Values.persistence.config.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "immich.fullname" . }}-config
  labels:
    {{- include "immich.labels" . | nindent 4 }}
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.persistence.config.storageClass }}
  storageClassName: {{ .Values.persistence.config.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.config.size }}
{{- end }}
