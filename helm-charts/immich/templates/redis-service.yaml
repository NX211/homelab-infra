---
{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: immich-redis
  labels:
    {{- include "immich.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.redis.service.port }}
    targetPort: redis
    protocol: TCP
    name: redis
  selector:
    app.kubernetes.io/name: {{ include "immich.name" . }}-redis
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
