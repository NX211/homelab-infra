# IT-Tools Helm Chart Values

# Image configuration
image:
  repository: ghcr.io/corentinth/it-tools
  tag: "2024.10.22-7ca5933"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 80

# Ingress configuration
ingress:
  enabled: true
  host: tools.authoritah.com
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: redtalon

# Resource limits
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi
