---
{{- if .Values.meilisearch.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "karakeeper.fullname" . }}-meilisearch
  labels:
    {{- include "karakeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "karakeeper.name" . }}-meilisearch
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "karakeeper.name" . }}-meilisearch
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: meilisearch
        image: "{{ .Values.meilisearch.image.repository }}:{{ .Values.meilisearch.image.tag }}"
        imagePullPolicy: {{ .Values.meilisearch.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.meilisearch.service.port }}
          protocol: TCP
        env:
        - name: MEILI_NO_ANALYTICS
          value: {{ .Values.meilisearch.env.MEILI_NO_ANALYTICS | quote }}
        volumeMounts:
        - name: data
          mountPath: /meili_data
        resources:
          {{- toYaml .Values.meilisearch.resources | nindent 10 }}
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: {{ include "karakeeper.fullname" . }}-meilisearch-data
{{- end }}
