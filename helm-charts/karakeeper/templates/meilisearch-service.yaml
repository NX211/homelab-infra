---
{{- if .Values.meilisearch.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "karakeeper.fullname" . }}-meilisearch
  labels:
    {{- include "karakeeper.labels" . | nindent 4 }}
    app.kubernetes.io/component: meilisearch
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.meilisearch.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: {{ include "karakeeper.name" . }}-meilisearch
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
