# Karakeeper Helm Chart Values

# Main app image
image:
  repository: ghcr.io/karakeep-app/karakeep
  tag: "0.31.0"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 3000

# Ingress configuration
ingress:
  enabled: true
  host: authoritah.click
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: greytalon

# Persistence
persistence:
  data:
    enabled: true
    size: 5Gi
    storageClass: local-path

# Environment variables
env:
  DATA_DIR: "/data"
  NEXTAUTH_URL: "https://authoritah.click"
  MEILI_ADDR: "http://karakeeper-meilisearch:7700"
  BROWSER_WEB_URL: "http://karakeeper-chrome:9222"
  OAUTH_WELLKNOWN_URL: "https://login.authoritah.com/.well-known/openid-configuration"
  OAUTH_PROVIDER_NAME: "Authoritah"
  OAUTH_SCOPE: "openid email profile"
  OAUTH_ALLOW_DANGEROUS_EMAIL_ACCOUNT_LINKING: "true"
  DISABLE_SIGNUPS: "true"
  OCR_CONFIDENCE_THRESHOLD: "60"
  OCR_LANGS: "eng"

# External Secrets (Bitwarden Secrets Manager — Workbench project)
externalSecrets:
  enabled: true
  refreshInterval: 1h
  secrets:
    - name: NEXTAUTH_SECRET
      key: 188cf1f6-6cf1-442c-a5dc-b3e8016f0e21  # karakeeper_nextauth_secret
    - name: OAUTH_CLIENT_ID
      key: 09d027db-98ca-4e74-9d6b-b3d30135ce2d  # karakeeper_oidc_client_id
    - name: OAUTH_CLIENT_SECRET
      key: 4260a82a-56ed-4282-8f80-b3d30135e653  # karakeeper_oidc_client_secret

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# Meilisearch
meilisearch:
  enabled: true
  image:
    repository: getmeili/meilisearch
    tag: "v1.42.1"
    pullPolicy: IfNotPresent
  service:
    port: 7700
  env:
    MEILI_NO_ANALYTICS: "true"
  persistence:
    enabled: true
    size: 2Gi
    storageClass: local-path
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 1Gi

# Chrome (headless browser for scraping)
chrome:
  enabled: true
  image:
    repository: gcr.io/zenika-hub/alpine-chrome
    tag: "124"
    pullPolicy: IfNotPresent
  service:
    port: 9222
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 1Gi
