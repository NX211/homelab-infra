{{- if .Values.draupnir.enabled }}
---
# Draupnir config is built entirely inside the ESO secret so the access token
# (the only sensitive field) never lands in a ConfigMap/git. The non-secret
# fields are rendered by Helm; accessToken is filled by ESO from Bitwarden.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.draupnir.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.draupnir.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        production.yaml: |
          homeserverUrl: "{{ .Values.synapseEndpoint }}"
          rawHomeserverUrl: "{{ (index .Values "matrix-synapse" "config" "publicBaseurl") }}"
          accessToken: {{ `"{{ .token }}"` }}
          managementRoom: "{{ .Values.draupnir.managementRoom }}"
          dataPath: "/data"
          autojoin: true
          autojoinOnlyIfManager: true
          recordIgnoredInvites: false
          protectAllJoinedRooms: false
          backgroundDelayMS: 500
          automaticallyRedactForReasons:
            - "spam"
            - "abuse"
          web:
            enabled: false
          health:
            healthz:
              enabled: false
  data:
    - secretKey: token
      remoteRef:
        key: draupnir-access-token
        property: value
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-draupnir
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
    app.kubernetes.io/name: matrix-draupnir
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix-draupnir
  template:
    metadata:
      labels:
        {{- include "matrix.labels" . | nindent 8 }}
        app.kubernetes.io/name: matrix-draupnir
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: draupnir
          image: {{ .Values.draupnir.image }}
          # The image entrypoint rewrites `bot <args>` to `node /draupnir/index.js <args>`.
          args: ["bot", "--draupnir-config", "/config/production.yaml"]
          resources:
            {{- toYaml .Values.draupnir.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              mountPath: /config
              readOnly: true
            - name: data
              mountPath: /data
      volumes:
        - name: config
          secret:
            secretName: {{ .Values.draupnir.secretName }}
        - name: data
          emptyDir: {}
{{- end }}
