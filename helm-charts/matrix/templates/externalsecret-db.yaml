{{- range $svc, $db := .Values.databases }}
---
# {{ $svc }} database credentials. Password is synced from Bitwarden via the
# secrets-vault bridge; username/database are non-secret literals injected here
# so the resulting Secret is self-contained for the Synapse/MAS charts.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ $db.secretName }}
  namespace: {{ $.Release.Namespace }}
  labels:
    {{- include "matrix.labels" $ | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ $.Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ $.Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ $db.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        username: {{ $db.user | quote }}
        database: {{ $db.name | quote }}
        password: "{{ `{{ .password }}` }}"
  data:
    - secretKey: password
      remoteRef:
        key: {{ $db.passwordRemoteKey }}
        property: value
{{- end }}
