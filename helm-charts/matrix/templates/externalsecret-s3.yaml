---
# SeaweedFS S3 credentials for the synapse-s3-storage-provider (scoped `synapse`
# identity, read/write/list on the synapse-media bucket only). Consumed as
# boto3 env vars by the media worker (and main) — keys never enter the ConfigMap.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: matrix-synapse-s3
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: matrix-synapse-s3
    creationPolicy: Owner
  data:
    - secretKey: access-key-id
      remoteRef:
        key: synapse-s3-access-key
        property: value
    - secretKey: secret-access-key
      remoteRef:
        key: synapse-s3-secret-key
        property: value
