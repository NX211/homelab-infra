---
# Synapse signing key (PERMANENT federation identity). Generated once and stored
# in Bitwarden; synced here so the chart consumes it via signingkey.existingSecret.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.synapseSigningKeySecret }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.synapseSigningKeySecret }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        signing.key: "{{ `{{ .key }}` }}"
  data:
    - secretKey: key
      remoteRef:
        key: synapse-signing-key
        property: value
