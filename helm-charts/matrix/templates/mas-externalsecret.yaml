{{- if .Values.mas.enabled }}
---
# MAS secret material. Assembled from Bitwarden via ESO. Mounted at /secrets in
# the MAS pod; config.yaml references these by file path, and db.yaml is merged
# as a second --config file (carries the DB password out of the ConfigMap).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: {{ .Values.mas.secretName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: {{ .Values.mas.secretName }}
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        encryption: {{ `"{{ .encryption }}"` }}
        rsa.pem: {{ `"{{ .rsa }}"` }}
        ec.pem: {{ `"{{ .ec }}"` }}
        google-client-secret: {{ `"{{ .googleSecret }}"` }}
        synapse-shared-secret: {{ `"{{ .sharedSecret }}"` }}
        db.yaml: |
          database:
            host: matrix-postgres-rw.{{ .Release.Namespace }}.svc.cluster.local
            port: 5432
            username: {{ .Values.databases.mas.user }}
            password: {{ `"{{ .dbPassword }}"` }}
            database: {{ .Values.databases.mas.name }}
  data:
    - secretKey: encryption
      remoteRef: { key: mas-encryption-secret, property: value }
    - secretKey: rsa
      remoteRef: { key: mas-signing-key-rsa, property: value }
    - secretKey: ec
      remoteRef: { key: mas-signing-key-ec, property: value }
    - secretKey: googleSecret
      remoteRef: { key: google-oauth-client-secret, property: value }
    - secretKey: sharedSecret
      remoteRef: { key: synapse-mas-shared-secret, property: value }
    - secretKey: dbPassword
      remoteRef: { key: mas-db-password, property: value }
---
# The same Synapse<->MAS shared secret, exposed to the Synapse pod for
# matrix_authentication_service.secret_path.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: matrix-synapse-mas
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.storeName }}
    kind: ClusterSecretStore
  target:
    name: matrix-synapse-mas
    creationPolicy: Owner
    template:
      type: Opaque
      data:
        shared-secret: {{ `"{{ .sharedSecret }}"` }}
  data:
    - secretKey: sharedSecret
      remoteRef: { key: synapse-mas-shared-secret, property: value }
{{- end }}
