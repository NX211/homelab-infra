{{- if .Values.synapseAdmin.enabled }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: matrix-synapse-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
data:
  # Pin the admin UI to our homeserver so it can't be pointed at arbitrary servers.
  config.json: |
    {
      "restrictBaseUrl": ["{{ (index .Values "matrix-synapse" "config" "publicBaseurl") }}"]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: matrix-synapse-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
    app.kubernetes.io/name: matrix-synapse-admin
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: matrix-synapse-admin
  template:
    metadata:
      labels:
        {{- include "matrix.labels" . | nindent 8 }}
        app.kubernetes.io/name: matrix-synapse-admin
    spec:
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: synapse-admin
          image: {{ .Values.synapseAdmin.image }}
          ports:
            - name: http
              # ketesa image runs static-web-server on 8080 (SERVER_PORT=8080)
              containerPort: 8080
          readinessProbe:
            httpGet:
              # static-web-server health endpoint (SERVER_HEALTH=true)
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          resources:
            {{- toYaml .Values.synapseAdmin.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: config
              # static-web-server web root: /var/public is symlinked to the
              # image web root (/home/sws/public), so config.json is served here.
              mountPath: /var/public/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: matrix-synapse-admin
---
apiVersion: v1
kind: Service
metadata:
  name: matrix-synapse-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: matrix-synapse-admin
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: matrix-synapse-admin
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "matrix.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
    - match: Host(`{{ .Values.synapseAdmin.host }}`)
      kind: Rule
      middlewares:
        # Restrict the admin UI to trusted internal networks (RFC1918). The
        # coreyalan.com domain has no Authelia session cookie / login portal, so
        # an IP allowlist is the right gate here rather than forward-auth.
        - name: internal-only
          namespace: default
      services:
        - name: matrix-synapse-admin
          port: 80
  tls:
    secretName: {{ .Values.tls.secretName }}
{{- end }}
