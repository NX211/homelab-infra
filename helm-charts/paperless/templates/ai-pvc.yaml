---
{{- if and .Values.ai.enabled .Values.ai.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "paperless.fullname" . }}-ai-data
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
spec:
  accessModes:
    - ReadWriteOnce
  {{- if .Values.ai.persistence.storageClass }}
  storageClassName: {{ .Values.ai.persistence.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.ai.persistence.size }}
{{- end }}
