---
{{- if .Values.ai.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "paperless.fullname" . }}-ai
  labels:
    {{- include "paperless.labels" . | nindent 4 }}
    app.kubernetes.io/component: ai
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.ai.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: {{ include "paperless.name" . }}-ai
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
