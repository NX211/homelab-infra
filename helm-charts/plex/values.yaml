# Plex Helm Chart Values

# Image configuration
image:
  repository: lscr.io/linuxserver/plex
  tag: "1.43.1.10611-1e34174b1-ls303"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 32400

# Ingress configuration
ingress:
  enabled: true
  host: authoritah.tv
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: blacktalon

# Persistence
persistence:
  config:
    enabled: true
    hostPath: /blacktalon/apps/plex
    size: 50Gi
    storageClass: local-path

  # Media directories (hostPath, read-only)
  media:
    enabled: true
    movies:
      hostPath: /blacktalon/media/movies
    moviesUhd:
      hostPath: /blacktalon/media/movies-uhd
    tv:
      hostPath: /blacktalon/media/tv
    tvUhd:
      hostPath: /blacktalon/media/tv-uhd
    kids:
      hostPath: /blacktalon/media/kids
    anime:
      hostPath: /blacktalon/media/anime
    music:
      hostPath: /blacktalon/media/music
    audiobooks:
      hostPath: /blacktalon/media/audiobooks
    preroll:
      hostPath: /blacktalon/media/preroll

# Hardware transcoding
hwTranscode:
  enabled: true

# Environment variables
env:
  TZ: America/New_York
  PUID: "8675309"
  PGID: "8675309"
  VERSION: docker

# Resource limits
resources:
  requests:
    cpu: 1000m
    memory: 2Gi
  limits:
    cpu: 4000m
    memory: 8Gi
