---
{{- if .Values.byparr.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "prowlarr.fullname" . }}-byparr
  labels:
    {{- include "prowlarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: byparr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: byparr
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: byparr
        app.kubernetes.io/instance: {{ .Release.Name }}
    spec:
      containers:
      - name: byparr
        image: "{{ .Values.byparr.image.repository }}:{{ .Values.byparr.image.tag }}"
        imagePullPolicy: {{ .Values.byparr.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.byparr.service.port }}
          protocol: TCP
        env:
        - name: HOST
          value: "0.0.0.0"
        - name: PORT
          value: {{ .Values.byparr.service.port | quote }}
        - name: TZ
          value: {{ .Values.env.TZ | quote }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.byparr.resources | nindent 10 }}
{{- end }}
