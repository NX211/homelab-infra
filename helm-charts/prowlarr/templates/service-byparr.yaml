---
{{- if .Values.byparr.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prowlarr.fullname" . }}-byparr
  labels:
    {{- include "prowlarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: byparr
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.byparr.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: byparr
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
