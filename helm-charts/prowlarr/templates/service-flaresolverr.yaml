---
{{- if .Values.flaresolverr.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "prowlarr.fullname" . }}-flaresolverr
  labels:
    {{- include "prowlarr.labels" . | nindent 4 }}
    app.kubernetes.io/component: flaresolverr
spec:
  type: ClusterIP
  ports:
  - port: {{ .Values.flaresolverr.service.port }}
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app.kubernetes.io/name: flaresolverr
    app.kubernetes.io/instance: {{ .Release.Name }}
{{- end }}
