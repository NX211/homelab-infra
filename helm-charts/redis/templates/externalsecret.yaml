---
# redis-ng password, synced from Bitwarden (STAGING_REDIS_NG_PASSWORD in the
# Workbench project, the shared ClusterSecretStore's project). The operator
# (redisSecret) and the three shared apps (REDIS_PASSWORD) all resolve to this
# same value. Prod sources the equivalent from GCP Secret Manager.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: redis-credentials
  namespace: {{ .Release.Namespace }}
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-secrets-manager
    kind: ClusterSecretStore
  target:
    name: redis-credentials
    creationPolicy: Owner
  data:
    - secretKey: redis-password
      remoteRef:
        key: aca253ab-7c1c-47b5-a2ec-b46f010193db
