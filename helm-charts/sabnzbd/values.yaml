# SABnzbd Helm Chart Values

# Image configuration
image:
  repository: ghcr.io/linuxserver/sabnzbd
  tag: "5.0.1"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 8080

# Ingress configuration
ingress:
  enabled: true
  host: sabnzbd.authoritah.com
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: blacktalon

# Persistence
persistence:
  config:
    enabled: true
    size: 2Gi
    storageClass: local-path

  # Downloads directories (hostPath)
  downloads:
    hostPath: /blacktalon/media/downloads
    mountPath: /media/downloads

# Environment variables
env:
  TZ: America/New_York
  PUID: "8675309"
  PGID: "8675309"

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 2000m
    memory: 2Gi
