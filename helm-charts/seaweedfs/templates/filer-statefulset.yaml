---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "seaweedfs.fullname" . }}-filer
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: filer
  annotations:
    # S3 identities are loaded only at startup (-s3.config). Restart the filer
    # when the s3.json secret changes (e.g. a new tenant identity is added).
    reloader.stakater.com/auto: "true"
spec:
  serviceName: {{ include "seaweedfs.fullname" . }}-filer
  replicas: {{ .Values.filer.replicas }}
  selector:
    matchLabels:
      {{- include "seaweedfs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: filer
  template:
    metadata:
      labels:
        {{- include "seaweedfs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: filer
    spec:
      enableServiceLinks: false
      {{- with .Values.filer.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: filer
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/bin/weed
            - -config_dir=/etc/seaweedfs
            - filer
            - -ip=$(POD_IP)
            - -ip.bind=0.0.0.0
            - -port={{ .Values.filer.port }}
            - -master={{ include "seaweedfs.fullname" . }}-master:{{ .Values.master.port }}
            {{- if .Values.filer.s3.enabled }}
            - -s3
            - -s3.port={{ .Values.filer.s3.port }}
            {{- if .Values.externalSecrets.enabled }}
            - -s3.config=/etc/seaweedfs/s3.json
            {{- end }}
            {{- end }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: {{ .Values.filer.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.filer.grpcPort }}
              protocol: TCP
            {{- if .Values.filer.s3.enabled }}
            - name: s3
              containerPort: {{ .Values.filer.s3.port }}
              protocol: TCP
            {{- end }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
            - name: filer-config
              mountPath: /etc/seaweedfs/filer.toml
              subPath: filer.toml
            {{- if and .Values.filer.s3.enabled .Values.externalSecrets.enabled }}
            - name: s3-config
              mountPath: /etc/seaweedfs/s3.json
              subPath: s3.json
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.filer.resources | nindent 12 }}
      volumes:
        - name: filer-config
          configMap:
            name: {{ include "seaweedfs.fullname" . }}-filer-config
        {{- if and .Values.filer.s3.enabled .Values.externalSecrets.enabled }}
        - name: s3-config
          secret:
            secretName: {{ .Values.externalSecrets.secretName }}
        {{- end }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.filer.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.filer.persistence.size }}
