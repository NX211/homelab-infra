---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ include "seaweedfs.fullname" . }}-volume
  labels:
    {{- include "seaweedfs.labels" . | nindent 4 }}
    app.kubernetes.io/component: volume
spec:
  serviceName: {{ include "seaweedfs.fullname" . }}-volume
  replicas: {{ .Values.volume.replicas }}
  selector:
    matchLabels:
      {{- include "seaweedfs.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: volume
  template:
    metadata:
      labels:
        {{- include "seaweedfs.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: volume
    spec:
      enableServiceLinks: false
      {{- with .Values.volume.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: volume
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - /usr/bin/weed
            - volume
            - -ip=$(POD_IP)
            - -ip.bind=0.0.0.0
            - -port={{ .Values.volume.port }}
            - -dir=/data
            - -max={{ .Values.volume.max }}
            - -mserver={{ include "seaweedfs.fullname" . }}-master:{{ .Values.master.port }}
            - -dataCenter={{ .Values.volume.dataCenter }}
            - -rack={{ .Values.volume.rack }}
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          ports:
            - name: http
              containerPort: {{ .Values.volume.port }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.volume.grpcPort }}
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /status
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            {{- toYaml .Values.volume.resources | nindent 12 }}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        storageClassName: {{ .Values.volume.persistence.storageClass }}
        resources:
          requests:
            storage: {{ .Values.volume.persistence.size }}
