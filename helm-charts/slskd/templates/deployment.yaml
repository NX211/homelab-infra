---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "slskd.fullname" . }}
  labels:
    {{- include "slskd.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "slskd.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "slskd.selectorLabels" . | nindent 8 }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
      - name: slskd
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        - name: slsk
          containerPort: 50300
          protocol: TCP
        env:
        - name: TZ
          value: {{ .Values.env.TZ | quote }}
        - name: SLSKD_DOWNLOADS_DIR
          value: {{ .Values.env.SLSKD_DOWNLOADS_DIR | quote }}
        - name: SLSKD_INCOMPLETE_DIR
          value: {{ .Values.env.SLSKD_INCOMPLETE_DIR | quote }}
        - name: SLSKD_SHARED_DIR
          value: {{ .Values.env.SLSKD_SHARED_DIR | quote }}
        - name: SLSKD_HTTP_PORT
          value: {{ .Values.env.SLSKD_HTTP_PORT | quote }}
        - name: SLSKD_NO_HTTPS
          value: {{ .Values.env.SLSKD_NO_HTTPS | quote }}
        - name: SLSKD_SLSK_LISTEN_PORT
          value: {{ .Values.env.SLSKD_SLSK_LISTEN_PORT | quote }}
        - name: SLSKD_METRICS
          value: {{ .Values.env.SLSKD_METRICS | quote }}
        - name: SLSKD_METRICS_NO_AUTH
          value: {{ .Values.env.SLSKD_METRICS_NO_AUTH | quote }}
        {{- if .Values.externalSecrets.enabled }}
        envFrom:
        - secretRef:
            name: {{ .Values.externalSecrets.secretName | default (printf "%s-secrets" (include "slskd.fullname" .)) }}
        {{- end }}
        volumeMounts:
        - name: app
          mountPath: /app
        - name: downloads
          mountPath: {{ .Values.persistence.downloads.mountPath }}
        - name: music
          mountPath: {{ .Values.persistence.music.mountPath }}
          readOnly: {{ .Values.persistence.music.readOnly }}
        livenessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /health
            port: http
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: app
        persistentVolumeClaim:
          claimName: {{ include "slskd.fullname" . }}-app
      - name: downloads
        hostPath:
          path: {{ .Values.persistence.downloads.hostPath }}
          type: Directory
      - name: music
        hostPath:
          path: {{ .Values.persistence.music.hostPath }}
          type: Directory
