# Suggestarr Helm Chart Values

# Image configuration
image:
  repository: ciuse99/suggestarr
  tag: "v2.4.3"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 5000

# Ingress configuration
ingress:
  enabled: true
  host: suggestarr.authoritah.com
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: redtalon

# Persistence
persistence:
  config:
    enabled: true
    size: 1Gi
    storageClass: local-path

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
