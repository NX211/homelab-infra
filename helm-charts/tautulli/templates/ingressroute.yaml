---
{{- if .Values.ingress.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: {{ include "tautulli.fullname" . }}
  labels:
    {{- include "tautulli.labels" . | nindent 4 }}
spec:
  entryPoints:
    - websecure
  routes:
  - match: Host(`{{ .Values.ingress.host }}`) && PathPrefix(`/newsletter`)
    kind: Rule
    priority: 20
    middlewares:
    - name: default-headers
      namespace: default
    services:
    - name: {{ include "tautulli.fullname" . }}
      port: {{ .Values.service.port }}
  - match: Host(`{{ .Values.ingress.host }}`)
    kind: Rule
    priority: 10
    middlewares:
    - name: default-headers
      namespace: default
    services:
    - name: {{ include "tautulli.fullname" . }}
      port: {{ .Values.service.port }}
  tls:
    secretName: {{ include "tautulli.fullname" . }}-tls
{{- end }}
