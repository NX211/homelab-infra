# Tracearr — media analytics for Plex + Jellyfin (replaces Tautulli).
#
# Footprint on greytalon:
#   - tracearr app (Deployment, singleton poller)
#   - bundled TimescaleDB (StatefulSet, PG18 + TSDB, 50Gi local-path)
#   - Redis is NOT bundled here: BullMQ points at the shared redis-shared
#     instance (noeviction) in the `redis` namespace, DB index 3.

tracearr:
  image:
    repository: ghcr.io/connorgallopo/tracearr
    tag: "1.5.0"
    pullPolicy: IfNotPresent

  replicaCount: 1  # singleton poller — only 1 supported

  service:
    type: ClusterIP
    port: 3000

  # Pin app + DB to the storage node (local-path PVCs are node-local).
  nodeSelector:
    kubernetes.io/hostname: greytalon

  resources:
    requests:
      cpu: 250m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

  env:
    NODE_ENV: production
    HOST: "0.0.0.0"
    PORT: "3000"  # must match containerPort (3000)
    LOG_LEVEL: info
    CORS_ORIGIN: "https://stats.authoritah.tv"
    TZ: America/New_York

  extraEnv: []

  backups:
    enabled: true
    size: 10Gi
    storageClass: local-path

  imageCache:
    enabled: true
    size: 5Gi
    storageClass: local-path

  # Dockerfile user: 1001:1001 (tracearr:nodejs)
  podSecurityContext:
    fsGroup: 1001

  securityContext:
    runAsUser: 1001
    runAsGroup: 1001
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # needs /app/data/image-cache + /data/backup
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 15
    periodSeconds: 30
    timeoutSeconds: 10
    failureThreshold: 3

  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3

  startupProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 30

  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}
  topologySpreadConstraints: []

# Secrets are provided by the ESO ExternalSecret below (bitwarden-secrets-manager).
# existingSecret makes the chart consume that Secret instead of generating one.
secrets:
  autoGenerate: false
  existingSecret: tracearr-secrets

# External Secrets Operator — pulls JWT_SECRET / COOKIE_SECRET / DB_PASSWORD from
# Bitwarden Secrets Manager. Create the three bws secrets, then paste their IDs.
externalSecrets:
  enabled: true
  secretName: tracearr-secrets
  refreshInterval: 1h
  secrets:
    # bws: tracearr_jwt_secret (Workbench project)
    - name: JWT_SECRET
      key: af09f4c7-0f46-4b28-accf-b48800f9899f
    # bws: tracearr_cookie_secret (Workbench project)
    - name: COOKIE_SECRET
      key: 7feaab93-b0e7-4732-9b93-b48800f989e3
    # bws: tracearr_db_password — bundled TimescaleDB `tracearr` role (Workbench project)
    - name: DB_PASSWORD
      key: 6379f4c8-83af-4080-b698-b48800f98a1d

timescale:
  enabled: true

  image:
    repository: timescale/timescaledb-ha
    tag: pg18.1-ts2.25.0@sha256:9dcbd18e5cb966398ae19f3882fd5fb2e19b3cb98be54d290ab9f69c75bf0a8b
    pullPolicy: IfNotPresent

  service:
    port: 5432

  postgresArgs:
    - "-c"
    - "timescaledb.license=timescale"
    - "-c"
    - "timescaledb.max_tuples_decompressed_per_dml_transaction=0"
    - "-c"
    - "max_locks_per_transaction=4096"
    - "-c"
    - "timescaledb.telemetry_level=off"
    # Tuned for 4 GB limit, SSD storage
    - "-c"
    - "shared_buffers=512MB"
    - "-c"
    - "effective_cache_size=2GB"
    - "-c"
    - "work_mem=16MB"
    - "-c"
    - "maintenance_work_mem=256MB"
    - "-c"
    - "wal_buffers=64MB"
    - "-c"
    - "max_wal_size=2GB"
    - "-c"
    - "checkpoint_completion_target=0.9"
    - "-c"
    - "random_page_cost=1.1"
    - "-c"
    - "effective_io_concurrency=200"

  shmSize: 512Mi

  persistence:
    size: 50Gi
    storageClass: local-path

  resources:
    requests:
      cpu: 500m
      memory: 2Gi
    limits:
      cpu: "4"
      memory: 4Gi

  # timescaledb-ha: UID 1000 (postgres)
  podSecurityContext:
    fsGroup: 1000

  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    readOnlyRootFilesystem: false  # PG writes temp files + runtime config
    capabilities:
      drop: [ALL]
    seccompProfile:
      type: RuntimeDefault

  # Pin the DB to the storage node alongside the app.
  nodeSelector:
    kubernetes.io/hostname: greytalon
  tolerations: []
  affinity: {}
  podAnnotations: {}
  podLabels: {}

# Unused (timescale.enabled=true), kept for completeness.
externalDatabase:
  host: ""
  port: 5432
  user: tracearr
  database: tracearr

# Redis is external: reuse the operator-managed redis-shared (noeviction, AOF)
# in the `redis` namespace. DB index 3 keeps Tracearr's BullMQ keyspace clear of
# Gitea (db 0) and Authelia (db 1). BullMQ requires noeviction — redis-shared
# already runs maxmemory-policy noeviction, unlike redis-ng (allkeys-lru).
redis:
  enabled: false

externalRedis:
  url: "redis://redis-shared.redis.svc.cluster.local:6379/3"

# House ingress: Traefik IngressRoute + cert-manager Certificate (see templates).
ingress:
  enabled: true
  host: stats.authoritah.tv
  clusterIssuer: letsencrypt-prod

serviceAccount:
  create: true
  name: ""
  annotations: {}
  automountServiceAccountToken: false

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""
