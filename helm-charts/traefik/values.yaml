# Traefik Helm Chart Values for k3s Homelab

traefik:
  # Global arguments
  globalArguments:
    - "--global.checknewversion=false"
    - "--global.sendanonymoususage=false"

  # Deployment
  deployment:
    kind: Deployment
    replicas: 1

  # Node selector - only yellowtalon has proxy role
  nodeSelector:
    node-role.kubernetes.io/proxy: "true"

  # Service
  service:
    type: ClusterIP

  # Ports
  ports:
    web:
      port: 80
      redirectTo:
        port: websecure
    websecure:
      port: 443
      tls:
        enabled: true

  # Logs
  logs:
    general:
      level: INFO
    access:
      enabled: true

  # Providers
  providers:
    kubernetesCRD:
      enabled: true
      allowCrossNamespace: true
    kubernetesIngress:
      enabled: true

  # Resources
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi
