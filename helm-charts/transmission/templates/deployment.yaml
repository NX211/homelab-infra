---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "transmission.fullname" . }}
  labels:
    {{- include "transmission.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "transmission.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "transmission.selectorLabels" . | nindent 8 }}
      {{- if .Values.vpn.enabled }}
      annotations:
        k8s.v1.cni.cncf.io/networks: '[{"name":"{{ .Values.vpn.networkName }}","default-route":["{{ .Values.vpn.gateway }}"]}]'
      {{- end }}
    spec:
      enableServiceLinks: false
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      initContainers:
      {{- if .Values.vpn.enabled }}
      - name: vpn-cluster-routes
        image: nicolaka/netshoot:v0.13
        securityContext:
          capabilities:
            add: ["NET_ADMIN"]
        command:
        - sh
        - -c
        - |
          set -e
          # Multus has swapped the pod's default route to net1 (VPN).
          # Re-add cluster CIDR routes via the flannel gateway on eth0
          # so kube-dns, services, and other pods stay reachable.
          GW=$(ip -4 addr show dev eth0 | awk '/inet / {print $2}' | head -1 | awk -F. '{print $1"."$2"."$3".1"}')
          ip route add {{ .Values.vpn.podCIDR }} via $GW dev eth0 2>/dev/null || true
          ip route add {{ .Values.vpn.serviceCIDR }} via $GW dev eth0 2>/dev/null || true
          echo "Cluster routes pinned via $GW dev eth0:"
          ip route
      {{- end }}
      - name: fix-permissions
        image: busybox
        command:
        - sh
        - -c
        - |
          chown -R {{ .Values.env.PUID }}:{{ .Values.env.PGID }} /config
        volumeMounts:
        - name: config
          mountPath: /config
      containers:
      - name: transmission
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: http
          containerPort: {{ .Values.service.port }}
          protocol: TCP
        - name: peer-tcp
          containerPort: {{ .Values.service.peerPort }}
          protocol: TCP
          hostPort: {{ .Values.service.peerPort }}
        - name: peer-udp
          containerPort: {{ .Values.service.peerPort }}
          protocol: UDP
          hostPort: {{ .Values.service.peerPort }}
        env:
        - name: TZ
          value: {{ .Values.env.TZ | quote }}
        - name: PUID
          value: {{ .Values.env.PUID | quote }}
        - name: PGID
          value: {{ .Values.env.PGID | quote }}
        - name: PEER_PORT
          value: {{ .Values.env.PEER_PORT | quote }}
        livenessProbe:
          httpGet:
            path: /transmission/web/
            port: http
          initialDelaySeconds: 60
          periodSeconds: 30
          timeoutSeconds: 10
          failureThreshold: 5
        readinessProbe:
          httpGet:
            path: /transmission/web/
            port: http
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        volumeMounts:
        - name: config
          mountPath: /config
        - name: downloads
          mountPath: {{ .Values.persistence.downloads.mountPath }}
        - name: watch
          mountPath: {{ .Values.persistence.watch.mountPath }}
        resources:
          {{- toYaml .Values.resources | nindent 10 }}
      volumes:
      - name: config
        persistentVolumeClaim:
          claimName: {{ include "transmission.fullname" . }}-config
      - name: downloads
        hostPath:
          path: {{ .Values.persistence.downloads.hostPath }}
          type: Directory
      - name: watch
        hostPath:
          path: {{ .Values.persistence.watch.hostPath }}
          type: DirectoryOrCreate
