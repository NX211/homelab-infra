# Wizarr Helm Chart Values

# Image configuration
image:
  repository: ghcr.io/wizarrrr/wizarr
  tag: "2026.4.0"
  pullPolicy: IfNotPresent

# Service configuration
service:
  port: 5690

# Ingress configuration
ingress:
  enabled: true
  host: join.authoritah.tv
  clusterIssuer: letsencrypt-prod

# Node selection
nodeSelector:
  kubernetes.io/hostname: redtalon

# Persistence
persistence:
  config:
    enabled: true
    size: 1Gi
    storageClass: local-path

# Resource limits
resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi
