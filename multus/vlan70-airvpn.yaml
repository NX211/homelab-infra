---
# Secondary network for pods that should send their public-internet traffic
# out via eno2 (VLAN70 / 10.70.0.0/24), which is policy-routed through
# AirVPN at the network level.
#
# Pods opt in by adding the annotation:
#   k8s.v1.cni.cncf.io/networks: '[{"name":"vlan70-airvpn","default-route":["10.70.0.1"]}]'
#
# Sync wave 0 so the NetworkAttachmentDefinition CRD (installed by Multus
# in wave -2) exists before this resource is applied.
apiVersion: k8s.cni.cncf.io/v1
kind: NetworkAttachmentDefinition
metadata:
  name: vlan70-airvpn
  namespace: default
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  config: |
    {
      "cniVersion": "0.3.1",
      "type": "macvlan",
      "master": "eno2",
      "mode": "bridge",
      "ipam": {
        "type": "host-local",
        "ranges": [[{
          "subnet":     "10.70.0.0/24",
          "rangeStart": "10.70.0.200",
          "rangeEnd":   "10.70.0.220",
          "gateway":    "10.70.0.1"
        }]],
        "routes": [
          { "dst": "0.0.0.0/0", "gw": "10.70.0.1" }
        ]
      }
    }
