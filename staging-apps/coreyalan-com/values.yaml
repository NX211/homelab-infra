# CoreyAlan.com - Staging Values
# Build once, deploy many: same image as prod, different config

staging-app:
  appName: coreyalan
  appLabel: CoreyAlan
  fullnameOverride: coreyalan-com-staging
  replicaCount: 1
  # Per-app Bitwarden secret store (least privilege)
  bitwarden:
    projectID: "14f07d19-a565-4e54-aa9c-b435015f87ce"
    organizationID: "4650c1c8-8d22-4073-8a7d-b3cf011d5ff2"
    credentialsSecret: bitwarden-staging-coreyalan-credentials
  # Database provisioning
  database:
    enabled: true
    superuser:
      create: false # jlshaw owns the shared postgres-superuser-staging secret
    userKey: 35793628-5218-41c5-9a05-b43501619084 # DB_USER
    passwordKey: ef080550-a690-4222-983d-b435016190c6 # DB_PASSWORD
    nameKey: 67004fdc-2164-4a0b-b578-b4350161912b # DB_NAME
  # Migration image (built by CI alongside the app image)
  migration:
    enabled: true
    repository: us-central1-docker.pkg.dev/corey-alan-prod/coreyalan/coreyalan-web-migrate
    digest: "sha256:PLACEHOLDER" # Updated by CI/CD
  image:
    repository: us-central1-docker.pkg.dev/corey-alan-prod/coreyalan/coreyalan-web
    pullPolicy: IfNotPresent
    digest: "sha256:PLACEHOLDER" # Updated by CI/CD
  imagePullSecrets:
    - name: gcr-pull-secret-coreyalan
  # GCP Artifact Registry pull secret (synced from Bitwarden via ESO)
  gcrPullSecret:
    bitwardenKey: 21c119f6-2790-43b0-bcbb-b43501628908 # GCR_SERVICE_ACCOUNT_KEY
    secretName: gcr-pull-secret-coreyalan
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: staging.coreyalan.com
    clusterIssuer: letsencrypt-prod
  env:
    - name: NODE_ENV
      value: production
    - name: NEXT_PUBLIC_APP_URL
      value: https://staging.coreyalan.com
    - name: NEXT_PUBLIC_SENTRY_ENVIRONMENT
      value: staging
  envFrom:
    - secretRef:
        name: coreyalan-staging-secrets
  # External Secrets (Bitwarden staging project)
  externalSecrets:
    enabled: true
    secretName: coreyalan-staging-secrets
    refreshInterval: 1h
