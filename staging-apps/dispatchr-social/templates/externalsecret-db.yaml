---
{{- if .Values.database.enabled }}
# NOTE: postgres-superuser-staging ExternalSecret is owned by jlshaw-link chart
# Both apps share the same superuser secret in the staging namespace
---
# App-specific database credentials (from Bitwarden staging project)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: dispatchr-database
  labels:
    {{- include "dispatchr-staging.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-staging-dispatchr
    kind: ClusterSecretStore
  target:
    name: dispatchr-database
    creationPolicy: Owner
  data:
    - secretKey: user
      remoteRef:
        key: {{ .Values.database.userKey }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.database.passwordKey }}
    - secretKey: dbname
      remoteRef:
        key: {{ .Values.database.nameKey }}
{{- end }}
