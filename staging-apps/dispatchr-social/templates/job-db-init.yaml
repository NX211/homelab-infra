---
{{- if .Values.database.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: dispatchr-db-init
  labels:
    {{- include "dispatchr-staging.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/hook: Sync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
    argocd.argoproj.io/sync-wave: "-2"
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        app: dispatchr-db-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: db-init
        image: postgres:16-alpine
        command:
        - sh
        - -c
        - |
          set -e
          echo "Waiting for PostgreSQL to be ready..."
          until pg_isready -h postgres-rw.default.svc.cluster.local -p 5432 -U postgres; do
            echo "Waiting for postgres..."
            sleep 2
          done

          echo "Creating Dispatchr database and user..."

          # Create user if it doesn't exist
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-rw.default.svc.cluster.local -U postgres -tc \
            "SELECT 1 FROM pg_user WHERE usename = '$DB_USER'" | grep -q 1 || \
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-rw.default.svc.cluster.local -U postgres -c \
            "CREATE USER \"$DB_USER\" WITH PASSWORD '$DB_PASSWORD';"

          # Create database if it doesn't exist
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-rw.default.svc.cluster.local -U postgres -tc \
            "SELECT 1 FROM pg_database WHERE datname = '$DB_NAME'" | grep -q 1 || \
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-rw.default.svc.cluster.local -U postgres -c \
            "CREATE DATABASE \"$DB_NAME\" OWNER \"$DB_USER\";"

          # Grant privileges
          PGPASSWORD="$POSTGRES_PASSWORD" psql -h postgres-rw.default.svc.cluster.local -U postgres -c \
            "GRANT ALL PRIVILEGES ON DATABASE \"$DB_NAME\" TO \"$DB_USER\";"

          echo "Database initialization complete!"
        env:
        - name: POSTGRES_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-superuser-staging
              key: password
        - name: DB_NAME
          valueFrom:
            secretKeyRef:
              name: dispatchr-database
              key: dbname
        - name: DB_USER
          valueFrom:
            secretKeyRef:
              name: dispatchr-database
              key: user
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: dispatchr-database
              key: password
{{- end }}
