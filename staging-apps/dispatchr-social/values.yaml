      - name: STRIPE_SECRET_KEY
        key: 396b03bf-8eb4-42bb-95ee-b423018a8d86
      - name: STRIPE_WEBHOOK_SECRET
        key: b67c88e5-27cc-454a-8b33-b423018abbda
      - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
        key: c0a65c7c-7c69-4375-8f74-b423018ae494
      - name: CHATWOOT_IDENTITY_TOKEN
        key: 9bd3d8b7-c9b0-4be2-b3f1-b423018b1362
      # Value MUST equal redis-ng's password (helm-charts/redis externalsecret).
      - name: REDIS_PASSWORD
        key: 6a68a51f-4939-42f1-a5b1-b423018b377f
      # SeaweedFS S3 credentials (identity: dispatchr-social; scoped to dispatchr-social-uploads)
      - name: S3_ACCESS_KEY_ID
        key: 4cdc219d-df58-4ae1-9d1d-b44e012680e7
      - name: S3_SECRET_ACCESS_KEY
        key: 427dcc21-f195-4b10-a330-b44e0126811a
      # GCP SA key for the off-cluster worker to auth to the ISOLATED staging
      # Pub/Sub (job-queue-staging / worker-sub-staging). Scoped to staging only
      # — see platform-infra pubsub-staging.tf. Mounted as a file by the worker.
      - name: GCP_WORKER_SA_KEY
        key: 01ccff5d-8bed-477d-b8e4-b46f015e8c84
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: 1000m
      memory: 512Mi
  livenessProbe:
    enabled: true
    path: /api/health
    port: 3000
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    enabled: true
    path: /api/health
    port: 3000
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3
  # Background worker + cron tier — mirrors prod, but on the ISOLATED staging
  # Pub/Sub queue (job-queue-staging / worker-sub-staging, NOT prod's). The
  # worker inherits the web env (Redis Sentinel) + envFrom (DATABASE_URL,
  # REDIS_PASSWORD) and adds the Pub/Sub vars + a mounted SA-key file.
  worker:
    enabled: true
    replicas: 1
    image:
      repository: us-central1-docker.pkg.dev/dispatchr-social/dispatchr-social/dispatchr-worker
      digest: "sha256:5df098d1062bdd934430854b500ceb52713158e1ea8eaa9bf49f9e36099aba27" # v0.1.54; update via CI
    command: ["tsx", "packages/core/src/jobs/worker.ts"]
    healthPort: 8080
    healthPath: /healthz
    gcpServiceAccountKey:
      enabled: true # mounts GCP_WORKER_SA_KEY (externalSecrets) as the ADC file
    env:
      - name: GCP_PROJECT_ID
        value: dispatchr-social
      # ISOLATED staging queue — never prod's job-queue/worker-sub.
      - name: PUBSUB_TOPIC_NAME
        value: job-queue-staging
      - name: PUBSUB_SUBSCRIPTION_NAME
        value: worker-sub-staging
      - name: WORKER_MAX_CONCURRENT
        value: "5"
      - name: WORKER_HEALTH_PORT
        value: "8080"
    cronJobs:
      - name: process-scheduled
        schedule: "* * * * *"
        command: ["tsx", "packages/core/src/jobs/cron-runner.ts", "PROCESS_SCHEDULED"]
      - name: refresh-tokens
        schedule: "*/15 * * * *"
        command: ["tsx", "packages/core/src/jobs/cron-runner.ts", "REFRESH_TOKENS"]
      - name: cleanup
        schedule: "0 * * * *"
        command: ["tsx", "packages/core/src/jobs/cron-runner.ts", "CLEANUP"]
