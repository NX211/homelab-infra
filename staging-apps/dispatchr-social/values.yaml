# Dispatchr Social - Staging Values
# Build once, deploy many: same image as prod, different config

staging-app:
  appName: dispatchr
  appLabel: Dispatchr
  fullnameOverride: dispatchr-social-staging
  replicaCount: 1
  # Per-app Bitwarden secret store (least privilege)
  bitwarden:
    projectID: "43127155-7737-4dd3-a964-b42300e8c787"
    organizationID: "4650c1c8-8d22-4073-8a7d-b3cf011d5ff2"
    credentialsSecret: bitwarden-staging-dispatchr-credentials
  # Database provisioning
  database:
    enabled: true
    superuser:
      create: false # jlshaw owns the shared postgres-superuser-staging secret
    userKey: 9d9fc2c3-5028-43ee-898a-b4230160c8dd # DISPATCHR_STAGING_DB_USER
    passwordKey: 55d4ef11-9439-436e-9335-b42301613350 # DISPATCHR_STAGING_DB_PASSWORD
    nameKey: aa6e43f9-115a-402e-b527-b423016103b2 # DISPATCHR_STAGING_DB_NAME
  # Migration image (built by CI alongside the app image)
  migration:
    enabled: false
    repository: us-central1-docker.pkg.dev/dispatchr-social/dispatchr-social/dispatchr-web-migrate
    digest: "sha256:PLACEHOLDER" # Updated by CI/CD
  image:
    repository: us-central1-docker.pkg.dev/dispatchr-social/dispatchr-social/dispatchr-web
    pullPolicy: IfNotPresent
    digest: "sha256:c5ae7a2acba9a86f22767260ec7395bf267fb12b6d37f3140958928f3290b580" # Updated by CI/CD
  imagePullSecrets:
    - name: gcr-pull-secret-dispatchr
  # GCP Artifact Registry pull secret (synced from Bitwarden via ESO)
  gcrPullSecret:
    bitwardenKey: 55ca8398-e8f1-442c-a64d-b42400fc91fa
    secretName: gcr-pull-secret-dispatchr
  service:
    type: ClusterIP
    port: 3000
  ingress:
    enabled: true
    host: staging.dispatchr.social
    clusterIssuer: letsencrypt-prod
  env:
    - name: NODE_ENV
      value: production
    - name: NEXT_PUBLIC_APP_URL
      value: https://staging.dispatchr.social
  envFrom:
    - secretRef:
        name: dispatchr-staging-secrets
  # External Secrets (Bitwarden staging project)
  externalSecrets:
    enabled: true
    secretName: dispatchr-staging-secrets
    refreshInterval: 1h
    secrets:
      - name: NEXTAUTH_SECRET
        key: 60f9375f-eaaa-4915-86d7-b423015fb1d2
