---
{{- if .Values.database.enabled }}
# Postgres superuser password (from kubernetes-backend, same source as postgres-superuser in default ns)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: postgres-superuser-staging
  labels:
    {{- include "jlshaw-staging.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: kubernetes-backend
    kind: ClusterSecretStore
  target:
    name: postgres-superuser-staging
    creationPolicy: Owner
  data:
    - secretKey: password
      remoteRef:
        key: postgres-root-password
        property: value
---
# App-specific database credentials (from Bitwarden staging project)
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: jlshaw-database
  labels:
    {{- include "jlshaw-staging.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-4"
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: bitwarden-staging-jlshaw
    kind: ClusterSecretStore
  target:
    name: jlshaw-database
    creationPolicy: Owner
  data:
    - secretKey: user
      remoteRef:
        key: {{ .Values.database.userKey }}
    - secretKey: password
      remoteRef:
        key: {{ .Values.database.passwordKey }}
    - secretKey: dbname
      remoteRef:
        key: {{ .Values.database.nameKey }}
{{- end }}
