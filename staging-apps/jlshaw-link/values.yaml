# JL Shaw Link - Staging Values
# Build once, deploy many: same image as prod, different config

replicaCount: 1
# Per-app Bitwarden secret store (least privilege — each app has its own Bitwarden project)
bitwarden:
  projectID: "2339785b-1aff-45ca-bd1e-b42200fc7070"
  organizationID: "4650c1c8-8d22-4073-8a7d-b3cf011d5ff2"
  credentialsSecret: bitwarden-staging-jlshaw-credentials # K8s secret with machine account token
# Database provisioning (creates database on postgres-1 if not exists)
# Superuser password is pulled from kubernetes-backend (same as prod postgres-superuser)
# App credentials below are from Bitwarden staging project
database:
  enabled: true
  userKey: 5a530cc9-c13a-4f00-8551-b423015eb89f # jlshaw db username
  passwordKey: 2327039d-c642-4f08-969a-b423015f0f23 # jlshaw db password
  nameKey: 6dc3af9c-d88e-42b6-85b6-b423015f56ee # jlshaw db name
# Migration image (built by CI alongside the app image)
migration:
  enabled: false
  repository: us-central1-docker.pkg.dev/jl-shaw-486618/jlshaw/jlshaw-web-migrate
  digest: "sha256:PLACEHOLDER" # Updated by CI/CD
image:
  repository: us-central1-docker.pkg.dev/jl-shaw-486618/jlshaw/jlshaw-web
  pullPolicy: IfNotPresent
  digest: "sha256:3d07fba1e802b7aa35987cfe2450266443569d9c544c1b8465fa2eda426ae218" # Updated by CI/CD
imagePullSecrets:
  - name: gcr-pull-secret
# GCP Artifact Registry pull secret (synced from Bitwarden via ESO)
gcrPullSecret:
  bitwardenKey: b8ac8e29-3460-4194-ac46-b42201589edc
service:
  type: ClusterIP
  port: 3000
ingress:
  enabled: true
  host: staging.jlshawconsulting.com
  clusterIssuer: letsencrypt-prod
env:
  - name: NODE_ENV
    value: production
  - name: NEXT_PUBLIC_APP_URL
    value: https://staging.jlshawconsulting.com
envFrom:
  - secretRef:
      name: jlshaw-staging-secrets
# External Secrets (Bitwarden staging project)
externalSecrets:
  enabled: true
  secretName: jlshaw-staging-secrets
  refreshInterval: 1h
  # Bitwarden project: staging-jlshaw (2339785b-1aff-45ca-bd1e-b42200fc7070)
  secrets:
    - name: DATABASE_URL
      key: f4ff2759-26bf-429b-bf7e-b42200fce459
    - name: NEXTAUTH_SECRET
      key: 9d40c8bd-79a9-4c23-a005-b42200fda1e6
    - name: NEXTAUTH_URL
      key: 25bbb302-f511-448b-8ec9-b42200fdf4e0
    - name: STRIPE_SECRET_KEY
      key: e47cc9f5-7a34-4fec-8da0-b42200fe268c
    - name: STRIPE_WEBHOOK_SECRET
      key: da8c77a7-3f3d-4f45-9d05-b42200fe4295
    - name: NEXT_PUBLIC_STRIPE_PUBLISHABLE_KEY
      key: a78b26a6-be33-40e2-a259-b42200fe5d3d
    - name: INTERNAL_API_SECRET
      key: e94a27a0-ae78-4cd6-87b5-b42200fe99f1
    - name: CRON_SECRET
      key: 6aa33b1f-6133-42da-aa73-b42200fec4c5
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 768Mi
livenessProbe:
  enabled: true
  path: /
  port: 3000
  initialDelaySeconds: 30
  periodSeconds: 10
  timeoutSeconds: 5
  failureThreshold: 3
readinessProbe:
  enabled: true
  path: /
  port: 3000
  initialDelaySeconds: 10
  periodSeconds: 5
  timeoutSeconds: 3
  failureThreshold: 3
