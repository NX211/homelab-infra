---
# Template: Staging IngressRoute
#
# Copy this file for each staging service. Replace:
#   - <clientapp>   with the client's domain (e.g. acmecorp for acmecorp.com)
#   - <service>     with the k8s Service name in the staging namespace
#   - <port>        with the service port number
#
# Before applying:
#   1. Deploy the service to the staging namespace
#   2. Add an A record in Tailscale admin console (DNS → Custom records):
#        staging.clientapp.com  A  <tailscale-ip>
#      where <tailscale-ip> is retrieved via:
#        kubectl get svc traefik-tailscale -n default -o jsonpath='{.status.loadBalancer.ingress[0].ip}'
#
# TLS note: certResolver: dnschallenge uses the Dreamhost DNS challenge already
# configured on this cluster. This works when the client's domain DNS is managed
# in Dreamhost. For other DNS providers, add a second cert resolver to the
# Traefik ArgoCD application and reference it here instead.
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: staging-<clientapp>
  namespace: staging
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`staging.<clientapp>.com`)
      services:
        - name: <service>
          port: <port>
          namespace: staging
  tls:
    certResolver: dnschallenge
    domains:
      - main: staging.<clientapp>.com
