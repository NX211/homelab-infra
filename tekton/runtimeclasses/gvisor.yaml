---
# gVisor sandbox RuntimeClass — the DEFAULT untrusted-tier runtime (design §1).
# Untrusted PR builds set spec.taskRunTemplate.podTemplate.runtimeClassName:
# gvisor so contributor code runs under runsc's userspace kernel.
#
# NODE PREREQUISITE (not GitOps): the `runsc` handler must be installed and
# registered in each worker node's containerd config
# (plugins."io.containerd.grpc.v1.cri".containerd.runtimes.runsc). Document this
# in the node provisioning runbook — a rebuilt node silently loses the sandbox.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: gvisor
handler: runsc
