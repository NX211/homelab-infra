---
# Kata Containers sandbox RuntimeClass — the untrusted runtime for native/NDK
# channels (Android) that gVisor's userspace kernel cannot run (design §1, §8).
# Per-pod microVM: full syscall compatibility AND a stronger (VM) isolation
# boundary. On bare-metal homelab nodes it runs natively (no nested virt).
#
# NODE PREREQUISITE (not GitOps): the `kata` handler must be installed and
# registered in each worker node's containerd config. Document in the node
# provisioning runbook alongside runsc.
apiVersion: node.k8s.io/v1
kind: RuntimeClass
metadata:
  name: kata
handler: kata
